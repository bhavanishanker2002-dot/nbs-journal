const CLOUD={
  BASE:"https://api.github.com/gists",
  async createBin(token){
    var r=await fetch(this.BASE,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"token "+token,"Accept":"application/vnd.github+json"},body:JSON.stringify({description:"NBS Trading Journal v11",public:false,files:{"nbs_data.json":{content:JSON.stringify({trades:[],firms:[],rules:[]})}}})});
    if(!r.ok)throw new Error("Bad token ("+r.status+")");
    return(await r.json()).id;
  },
  async read(gistId,token){
    var r=await fetch(this.BASE+"/"+gistId,{headers:{"Authorization":"token "+token,"Accept":"application/vnd.github+json"}});
    if(r.status===401)throw new Error("401 — bad token");
    if(r.status===404)throw new Error("404 — gist not found");
    if(!r.ok)throw new Error("HTTP "+r.status);
    var j=await r.json();
    var raw=j.files?.["nbs_data.json"]?.content;
    if(!raw)throw new Error("File not found in gist");
    return JSON.parse(raw);
  },
  async write(gistId,token,data){
    var r=await fetch(this.BASE+"/"+gistId,{method:"PATCH",headers:{"Content-Type":"application/json","Authorization":"token "+token,"Accept":"application/vnd.github+json"},body:JSON.stringify({files:{"nbs_data.json":{content:JSON.stringify(data)}}})});
    if(!r.ok)throw new Error("Save failed ("+r.status+")");
  }
};

// ═══════ HELPERS ═══════
const mono={fontFamily:"'DM Mono',monospace"};
const nowTs=()=>new Date().toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit",hour12:false}).replace(","," —");
const scoreEntry=f=>[f.c1,f.c2,f.c3,f.c4,f.c5,f.c6,f.c7,f.c8].filter(Boolean).length;
const pipSz=p=>p?.toUpperCase().includes("JPY")?0.01:0.0001;
const pipVal=(p,price)=>p?.toUpperCase().includes("JPY")?1000/(price||150):10;
const calcLots=(pair,entry,sl,riskPct,acct)=>{
  const[e,s,r,a]=[parseFloat(entry),parseFloat(sl),parseFloat(riskPct),parseFloat(acct)];
  if(!e||!s||!r||!a||e===s)return null;
  return Math.floor((a*r/100)/(Math.abs(e-s)/pipSz(pair)*pipVal(pair,e))*100)/100;
};
const calcRR=(e,sl,tp,dir)=>{
  const[ev,sv,tv]=[parseFloat(e),parseFloat(sl),parseFloat(tp)];
  if(!ev||!sv||!tv||ev===sv)return null;
  return parseFloat(((dir==="BUY"?tv-ev:ev-tv)/Math.abs(ev-sv)).toFixed(2));
};
const rrC=r=>r>=4?"#34d399":r>=2?"#c8f135":r>=1?"#f0a500":"#ff4444";
const parseDate=ts=>{if(!ts)return null;try{const d=new Date(ts.replace(" — "," "));return isNaN(d)?null:d;}catch{return null;}};
const dKey=d=>{if(!d)return null;const dt=d instanceof Date?d:new Date(d);if(isNaN(dt))return null;return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;};
const addDays=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
const fmtC=n=>{if(n==null||isNaN(n))return"–";const s=Math.abs(n)>=1000?`$${(Math.abs(n)/1000).toFixed(1)}k`:`$${Math.abs(n).toFixed(0)}`;return n<0?`-${s}`:`+${s}`;};
const fmtP=n=>n==null||isNaN(n)?"–":(n>=0?"+":"")+n.toFixed(2)+"%";
const getWk=d=>{const t=new Date(d);t.setHours(0,0,0,0);const day=t.getDay()||7;t.setDate(t.getDate()+1-day);return t.toISOString().substring(0,10);};

// ═══════════════════════════════════════════════════════════
// PER-ACCOUNT RESULT SYSTEM
// trade.accountResults = { "firmId": { outcome, actualPct, ... } }
// Shared fields: pair, entry, sl, tp, lots, checklist, beforeNotes, photoBefore
// Independent per-account: outcome, actualPct, exitPrice, exitWhy, afterNotes, photoAfter, exitTimestamp
// ═══════════════════════════════════════════════════════════
const getAccResult=(trade,firmId)=>{
  const root={outcome:trade.outcome||"",actualPct:trade.actualPct||"",exitPrice:trade.exitPrice||"",exitWhy:trade.exitWhy||"",afterNotes:trade.afterNotes||"",photoAfter:trade.photoAfter||"",exitTimestamp:trade.exitTimestamp||"",xc1:trade.xc1||false,xc2:trade.xc2||false,xc3:trade.xc3||false,xc4:trade.xc4||false};
  if(firmId==null)return root;
  const ar=trade.accountResults||{};
  return ar[String(firmId)]?ar[String(firmId)]:root;
};

// Save to ONE account
const buildOneAccUpdate=(trade,firmId,data)=>{
  if(firmId==null)return data;
  return{accountResults:{...(trade.accountResults||{}),[String(firmId)]:data}};
};

// Save to ALL assigned accounts (same result everywhere) + root fields
const buildAllAccUpdate=(trade,data)=>{
  const ar={...(trade.accountResults||{})};
  (trade.firmIds||[]).forEach(id=>{ar[String(id)]=data;});
  return{...data,accountResults:ar};
};

const tradePnlDollar=(t,acctSize,firmId)=>{
  const r=getAccResult(t,firmId);
  const p=parseFloat(r.actualPct);
  return isNaN(p)?null:(parseFloat(acctSize)||100000)*p/100;
};

// ═══════ ANALYTICS ═══════
function calcStats(trades,acctSize,firmId){
  const getR=t=>getAccResult(t,firmId);
  const closed=trades.filter(t=>{const r=getR(t);return r.outcome&&!r.outcome.includes("Running")&&r.actualPct!=null&&r.actualPct!==""});
  const winT=closed.filter(t=>parseFloat(getR(t).actualPct)>0);
  const losT=closed.filter(t=>parseFloat(getR(t).actualPct)<0);
  const[tot,wins,losses]=[closed.length,winT.length,losT.length];
  const pnl=t=>tradePnlDollar(t,acctSize,firmId)||0;
  const gp=winT.reduce((s,t)=>s+pnl(t),0);
  const gl=Math.abs(losT.reduce((s,t)=>s+pnl(t),0));
  const np=gp-gl,pf=gl>0?gp/gl:wins>0?99:0;
  const aw=wins?gp/wins:0,al=losses?gl/losses:0;
  const exp=tot?(wins/tot*aw)-(losses/tot*al):0;
  const best=closed.reduce((b,t)=>Math.max(b,pnl(t)),-Infinity);
  const worst=closed.reduce((b,t)=>Math.min(b,pnl(t)),Infinity);
  const avgSz=closed.length?closed.reduce((s,t)=>s+(parseFloat(getR(t).lots||t.lots)||0),0)/closed.length:0;
  const durs=closed.filter(t=>getR(t).exitTimestamp&&t.timestamp).map(t=>{const en=parseDate(t.timestamp),ex=new Date(getR(t).exitTimestamp);return(!en||isNaN(ex))?null:Math.max(0,Math.round((ex-en)/3600000));}).filter(d=>d!==null);
  const avgDur=durs.length?durs.reduce((a,b)=>a+b,0)/durs.length:0;
  const sorted=[...closed].sort((a,b)=>(parseDate(a.timestamp)||0)-(parseDate(b.timestamp)||0));
  let bal=parseFloat(acctSize)||100000,hwm=bal,hwmDate=null;
  const equity=[{bal}];
  sorted.forEach(t=>{const p2=pnl(t);bal+=p2;if(bal>hwm){hwm=bal;hwmDate=t.timestamp?.substring(0,9);}equity.push({date:t.timestamp?.substring(0,9)||"",bal,pnl:p2,pair:t.pair,outcome:getR(t).outcome});});
  const wkMap={};
  closed.forEach(t=>{const d=parseDate(t.timestamp);if(!d)return;const wk=getWk(d);if(!wkMap[wk])wkMap[wk]={week:wk,trades:0,wins:0,losses:0,pnl:0};const p2=pnl(t);wkMap[wk].trades++;if(p2>0)wkMap[wk].wins++;else if(p2<0)wkMap[wk].losses++;wkMap[wk].pnl+=p2;});
  const weekly=Object.values(wkMap).sort((a,b)=>b.week>a.week?1:-1).slice(-12);
  const splitSt=dir=>{const tr=closed.filter(t=>t.direction===dir);const w=tr.filter(t=>parseFloat(getR(t).actualPct)>0).length;return{total:tr.length,wins:w,losses:tr.length-w,wr:tr.length?Math.round(w/tr.length*100):0,pnl:tr.reduce((s,t)=>s+pnl(t),0)};};
  return{tot,wins,losses,winRate:tot?Math.round(wins/tot*100):0,gp,gl,np,pf,best:best===-Infinity?0:best,worst:worst===Infinity?0:worst,exp,avgSz,avgDur,equity,bal,hwm,hwmDate,pnlHwm:bal-hwm,weekly,long:splitSt("BUY"),short:splitSt("SELL")};
}

// ═══════ EQUITY CURVE ═══════
function EquityCurve({equity}){
  if(!equity||equity.length<2)return<div style={{height:120,display:"flex",alignItems:"center",justifyContent:"center",...mono,fontSize:11,color:"#2a2a2a"}}>No closed trades yet</div>;
  const bals=equity.map(e=>e.bal),mn=Math.min(...bals),mx=Math.max(...bals),rng=mx-mn||1;
  const W=500,H=110,P=8,x=i=>(i/(equity.length-1))*(W-P*2)+P,y=b=>H-P-(b-mn)/rng*(H-P*2);
  const pts=equity.map((e,i)=>`${x(i).toFixed(1)},${y(e.bal).toFixed(1)}`).join(" ");
  const isUp=equity[equity.length-1].bal>=equity[0].bal,lc=isUp?"#34d399":"#ff4444";
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:120,display:"block"}} preserveAspectRatio="none">
      <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={lc} stopOpacity=".18"/><stop offset="100%" stopColor={lc} stopOpacity="0"/></linearGradient></defs>
      <polygon points={`${x(0).toFixed(1)},${H} ${pts} ${x(equity.length-1).toFixed(1)},${H}`} fill="url(#g)"/>
      <polyline points={pts} fill="none" stroke={lc} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
      <line x1={P} y1={y(equity[0].bal)} x2={W-P} y2={y(equity[0].bal)} stroke="#2a2a2a" strokeWidth="0.5" strokeDasharray="3,3"/>
      {equity.map((e,i)=>e.pnl!=null&&<circle key={i} cx={x(i)} cy={y(e.bal)} r="2.2" fill={e.pnl>=0?"#34d399":"#ff4444"} opacity=".7"/>)}
    </svg>
  );
}

// ═══════ LOT CALCULATOR ═══════
function LotCalc({pair,entry,sl,riskPct,firmIds,firms}){
  if(!entry||!sl||!pair||!riskPct)return null;
  const sel=(firmIds||[]).map(id=>firms.find(f=>f.id===id)).filter(Boolean);
  const configs=sel.length>0?sel.map(f=>[f.name,calcLots(pair,entry,sl,riskPct,f.accountSize),f.color,f.accountSize]):[["$100k",calcLots(pair,entry,sl,riskPct,100000),"#555",100000]];
  const slPips=entry&&sl?(Math.abs(parseFloat(entry)-parseFloat(sl))/pipSz(pair)).toFixed(1):null;
  return<div style={{background:"rgba(200,241,53,.04)",border:"1px solid rgba(200,241,53,.14)",borderRadius:8,padding:12}}>
    <div style={{...mono,fontSize:9,letterSpacing:3,color:"#c8f135",textTransform:"uppercase",marginBottom:8}}>Auto Lot Calculator — {riskPct}% Risk</div>
    <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(configs.length,3)},1fr)`,gap:6}}>
      {configs.map(([label,val,col,size])=><div key={label} style={{background:"#111",borderRadius:6,padding:"8px 10px",textAlign:"center",borderTop:`2px solid ${col}44`}}>
        <div style={{...mono,fontSize:9,color:col||"#555",marginBottom:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{label}</div>
        <div style={{...mono,fontSize:8,color:"#444",marginBottom:3}}>${Number(size).toLocaleString()}</div>
        <div style={{...mono,fontSize:18,fontWeight:"bold",color:"#c8f135"}}>{val||"–"}</div>
        <div style={{...mono,fontSize:9,color:"#555"}}>lots</div>
      </div>)}
    </div>
    {slPips&&<div style={{...mono,fontSize:10,color:"#444",marginTop:7,textAlign:"center"}}>SL = {slPips} pips · {pair}</div>}
  </div>;
}

// ═══════ FOREX NEWS ═══════
function ForexNews(){
  const[events,setEvents]=useState([]);
  const[loading,setLoading]=useState(true);

// ═══════ CALENDAR ═══════
function CalendarView({trades,title}){
  const n=new Date();
  const[year,setYear]=useState(n.getFullYear());
  const[month,setMonth]=useState(n.getMonth());
  const[selected,setSelected]=useState(null);
  const MN=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const dayMap=useMemo(()=>{
    const map={};
    trades.forEach(t=>{
      const ed=parseDate(t.timestamp);if(!ed)return;
      const r=getAccResult(t,null);
      const isRunning=!r.outcome||r.outcome.includes("Running");
      let exitDate=null;if(r.exitTimestamp){exitDate=new Date(r.exitTimestamp);if(isNaN(exitDate))exitDate=null;}
      const eKey=dKey(ed);if(!map[eKey])map[eKey]=[];map[eKey].push({type:"entry",trade:t});
      if(!isRunning&&exitDate){let cur=addDays(ed,1);while(dKey(cur)!==dKey(exitDate)&&Math.floor((cur-ed)/86400000)<90){const k=dKey(cur);if(!map[k])map[k]=[];map[k].push({type:"running",trade:t});cur=addDays(cur,1);}const xk=dKey(exitDate);if(!map[xk])map[xk]=[];map[xk].push({type:"exit",trade:t});}
      else if(isRunning){let cur=addDays(ed,1);const today=new Date();today.setHours(0,0,0,0);while(cur<=today&&Math.floor((cur-ed)/86400000)<90){const k=dKey(cur);if(!map[k])map[k]=[];map[k].push({type:"running",trade:t});cur=addDays(cur,1);}}
    });
    return map;
  },[trades]);
  const firstDay=new Date(year,month,1),lastDay=new Date(year,month+1,0);
  const startDow=(firstDay.getDay()+6)%7;
  const days=[];
  for(let i=0;i<startDow;i++)days.push(null);
  for(let d=1;d<=lastDay.getDate();d++)days.push(new Date(year,month,d));
  const dayCol=evts=>{if(!evts?.length)return null;const exits=evts.filter(e=>e.type==="exit");if(exits.length){const w=exits.some(e=>parseFloat(getAccResult(e.trade,null).actualPct)>0),l=exits.some(e=>parseFloat(getAccResult(e.trade,null).actualPct)<0);if(w&&!l)return"#34d399";if(l&&!w)return"#ff4444";return"#f0a500";}if(evts.some(e=>e.type==="entry"))return"#c8f135";if(evts.some(e=>e.type==="running")){return evts.find(e=>e.type==="running").trade.direction==="BUY"?"rgba(52,211,153,.35)":"rgba(255,68,68,.35)";}return null;};
  const mT=trades.filter(t=>{const d=parseDate(t.timestamp);return d&&d.getFullYear()===year&&d.getMonth()===month;});
  const mCl=mT.filter(t=>{const r=getAccResult(t,null);return r.outcome&&!r.outcome.includes("Running");});
  const mNet=mCl.reduce((s,t)=>s+(parseFloat(getAccResult(t,null).actualPct)||0),0);
  const mW=mCl.filter(t=>getAccResult(t,null).outcome?.includes("Win")).length;
  const selKey=selected?dKey(selected):null,selEvts=selKey?(dayMap[selKey]||[]):[];
  return<div>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
      <div style={{display:"flex",alignItems:"center",gap:7}}>
        <button onClick={()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);}} style={{...BS,padding:"6px 11px",background:"#111",border:"1px solid #1e1e1e",color:"#888"}}>‹</button>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:"white",minWidth:190,textAlign:"center"}}>{MN[month]} {year}</div>
        <button onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);}} style={{...BS,padding:"6px 11px",background:"#111",border:"1px solid #1e1e1e",color:"#888"}}>›</button>
      </div>
      <div style={{background:"#0d0d0d",border:"1px solid #191919",borderRadius:7,padding:"7px 12px",display:"flex",gap:12}}>
        <div style={{textAlign:"center"}}><div style={{...mono,fontSize:15,fontWeight:"bold",color:mNet>=0?"#34d399":"#ff4444"}}>{mNet>=0?"+":""}{mNet.toFixed(1)}%</div><div style={{...mono,fontSize:9,color:"#444"}}>Monthly</div></div>
        <div style={{textAlign:"center"}}><div style={{...mono,fontSize:15,fontWeight:"bold",color:"#e0e0e0"}}>{mW}/{mCl.length}</div><div style={{...mono,fontSize:9,color:"#444"}}>W/Total</div></div>
        <div style={{textAlign:"center"}}><div style={{...mono,fontSize:15,fontWeight:"bold",color:"#c8f135"}}>{mT.length}</div><div style={{...mono,fontSize:9,color:"#444"}}>Trades</div></div>
      </div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:2}}>
      {["M","T","W","T","F","S","S"].map((d,i)=><div key={i} style={{...mono,fontSize:9,color:"#444",textAlign:"center",padding:"3px 0"}}>{d}</div>)}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
      {days.map((day,i)=>{
        if(!day)return<div key={"e"+i}/>;
        const key=dKey(day),evts=dayMap[key]||[],col=dayCol(evts),isSel=selKey===key,isToday=dKey(new Date())===key;
        const entryEvts=evts.filter(e=>e.type==="entry"),exitEvts=evts.filter(e=>e.type==="exit");
        return<div key={key} onClick={()=>setSelected(isSel?null:day)} style={{minHeight:54,borderRadius:5,background:"#0a0a0a",border:`1px solid ${isSel?"#c8f135":(isToday?"#2a2a2a":(col?col+"55":"#111"))}`,cursor:evts.length?"pointer":"default",position:"relative",overflow:"hidden",padding:"2px 3px",transition:"all .12s"}}>
          {col&&<div style={{position:"absolute",top:0,left:0,right:0,height:2,background:col,opacity:.9}}/>}
          <div style={{marginTop:col?3:0,display:"flex",flexDirection:"column",gap:1}}>
            <div style={{...mono,fontSize:10,color:isToday?"#c8f135":col?"#ddd":"#444",fontWeight:isToday?"bold":"normal"}}>{day.getDate()}</div>
            {entryEvts.slice(0,2).map((ev,j)=><div key={j} style={{background:"rgba(200,241,53,.12)",borderRadius:2,padding:"0 2px"}}><div style={{...mono,fontSize:8,color:"#c8f135"}}>{ev.trade.pair}</div></div>)}
            {exitEvts.slice(0,1).map((ev,j)=>{const r=getAccResult(ev.trade,null);return<div key={j} style={{background:r.outcome?.includes("Win")?"rgba(52,211,153,.15)":"rgba(255,68,68,.15)",borderRadius:2,padding:"0 2px"}}><div style={{...mono,fontSize:8,color:r.outcome?.includes("Win")?"#34d399":"#ff4444"}}>{r.actualPct?(parseFloat(r.actualPct)>=0?"+":"")+r.actualPct+"%":"exit"}</div></div>;})}
          </div>
        </div>;
      })}
    </div>
    {selected&&selEvts.length>0&&<div style={{marginTop:10,background:"#0d0d0d",border:"1px solid #1a1a1a",borderRadius:9,padding:13}}>
      <div style={{...mono,fontSize:10,color:"#555",letterSpacing:2,textTransform:"uppercase",marginBottom:9}}>{selected.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div>
      {selEvts.map((ev,i)=>{const t=ev.trade;const r=getAccResult(t,null);return<div key={i} style={{background:"#111",border:"1px solid #1a1a1a",borderRadius:7,padding:10,marginBottom:5,borderLeft:`3px solid ${ev.type==="entry"?"#c8f135":ev.type==="exit"?(r.outcome?.includes("Win")?"#34d399":"#ff4444"):"#333"}`}}>
        <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
          <span style={{...mono,fontWeight:"bold",color:"white",fontSize:13}}>{t.pair}</span>
          <Pill label={ev.type.toUpperCase()} col={ev.type==="entry"?"lime":ev.type==="exit"?(r.outcome?.includes("Win")?"green":"red"):"zinc"} sm/>
          {r.actualPct&&<span style={{...mono,fontSize:12,color:parseFloat(r.actualPct)>=0?"#34d399":"#ff4444"}}>{parseFloat(r.actualPct)>=0?"+":""}{r.actualPct}%</span>}
        </div>
      </div>;})}
    </div>}
  </div>;
}

            ))}
          </div>
        </div>

        {/* ── OUTCOME SECTION ── */}
        {firmId!=null?(
          // ACCOUNT VIEW — per-account outcome with "this account / same for all" buttons
          <div style={{background:"rgba(0,0,0,.25)",border:`1px solid ${firm?.color||"#333"}33`,borderRadius:8,padding:11}}>
            <div style={{...mono,fontSize:9,color:firm?.color||"#888",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>
              {firm?.name} — Outcome
            </div>
            {hasOutcome&&!editOut?(
              <div>
                {res.photoAfter&&<img src={res.photoAfter} alt="" style={{width:"100%",maxHeight:190,objectFit:"contain",borderRadius:7,border:"1px solid #1e1e1e",marginBottom:7}}/>}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:7}}>
                  {[["Outcome",res.outcome],["P&L",res.actualPct?(parseFloat(res.actualPct)>=0?"+":"")+res.actualPct+"%":"–"],["Exit Price",res.exitPrice],["Exit Reason",res.exitWhy]].map(([k,v])=>(
                    <div key={k} style={{background:"#111",borderRadius:5,padding:"8px 9px"}}><div style={{...LB,marginBottom:2}}>{k}</div><div style={{...mono,fontSize:11,color:k==="P&L"?pctCol:"#ddd"}}>{v||"–"}</div></div>
                  ))}
                </div>
                {res.afterNotes&&<div style={{background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:6,padding:10,...mono,fontSize:12,color:"#bbb",lineHeight:1.7,whiteSpace:"pre-wrap"}}>{res.afterNotes}</div>}
                <button onClick={()=>setEditOut(true)} style={{...mono,fontSize:9,color:"#444",background:"none",border:"none",cursor:"pointer",marginTop:6,letterSpacing:1}}>✎ edit outcome</button>
              </div>
            ):(
              <OutcomeForm
                initial={res}
                trade={trade}
                firm={firm}
                firmId={firmId}
                isEdit={editOut}
                onSaveOne={handleSaveOne}
                onSaveAll={handleSaveAll}
                onCancel={()=>setEditOut(false)}
              />
            )}
          </div>
        ):(
          // GLOBAL JOURNAL VIEW — normal single outcome
          <div>
            {hasOutcome&&!editOut?(
              <div>
                <Divider t="After"/>
                {res.photoAfter&&<img src={res.photoAfter} alt="" style={{width:"100%",maxHeight:190,objectFit:"contain",borderRadius:7,border:"1px solid #1e1e1e",marginBottom:7}}/>}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:7}}>
                  {[["Exit Price",res.exitPrice],["Exit Reason",res.exitWhy]].map(([k,v])=><div key={k} style={{background:"#111",borderRadius:5,padding:"8px 9px"}}><div style={{...LB,marginBottom:2}}>{k}</div><div style={{...mono,fontSize:11}}>{v||"–"}</div></div>)}
                </div>
                {res.afterNotes&&<div style={{background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:6,padding:10,...mono,fontSize:12,color:"#bbb",lineHeight:1.7,whiteSpace:"pre-wrap"}}>{res.afterNotes}</div>}
                <button onClick={()=>setEditOut(true)} style={{...mono,fontSize:9,color:"#333",background:"none",border:"none",cursor:"pointer",marginTop:5,letterSpacing:1}}>✎ edit outcome</button>
              </div>
            ):(
              <div style={{border:"1px solid #1c1c1c",borderRadius:8,padding:12,background:"#0a0a0a"}}>
                <Divider t="Update outcome"/>
                <div style={{height:8}}/>
                <OutcomeForm
                  initial={res}
                  trade={trade}
                  firm={null}
                  firmId={null}
                  isEdit={editOut}
                  onSaveOne={handleSaveOne}
                  onSaveAll={handleSaveAll}
                  onCancel={()=>setEditOut(false)}
                />
              </div>
            )}
          </div>
        )}

        <button onClick={()=>onDelete(trade.id)} style={{...mono,fontSize:9,color:"#222",background:"none",border:"none",cursor:"pointer",letterSpacing:2,textTransform:"uppercase"}}>✕ delete trade</button>
      </div>}
    </div>
  );
}

// ═══════ FIRM DETAIL ═══════
function FirmDetail({firm,trades,firms,onBack,onUpdate,onDelete,onUpdateTrade,onDeleteTrade}){
  const[tab,setTab]=useState("stats");
  const[editMode,setEditMode]=useState(false);
  const[ef,setEf]=useState({name:firm.name,color:firm.color,accountSize:String(firm.accountSize),profitTarget:String(firm.profitTarget),maxDaily:String(firm.maxDaily),maxDrawdown:String(firm.maxDrawdown),phase:firm.phase});
  const[confirmDel,setConfirmDel]=useState(false);
  const firmTrades=trades.filter(t=>(t.firmIds||[]).includes(firm.id));
  const s=calcStats(firmTrades,firm.accountSize,firm.id);
  const phC={Challenge:"#c8f135",Verification:"#38bdf8",Funded:"#34d399",Passed:"#a78bfa",Failed:"#ff4444",Live:"#34d399"};
  const ph=phC[firm.phase]||"#888";
  const saveEdit=()=>{onUpdate(firm.id,{...ef,accountSize:parseFloat(ef.accountSize),profitTarget:parseFloat(ef.profitTarget)||0,maxDaily:parseFloat(ef.maxDaily)||0,maxDrawdown:parseFloat(ef.maxDrawdown)||0});setEditMode(false);};
  const dlCSV=()=>{
    const rows=[["Date","Pair","Dir","Entry","SL","TP","Lots","Risk%","R:R","Outcome","PnL%","Exit Reason"]];
    firmTrades.forEach(t=>{const r=getAccResult(t,firm.id);rows.push([t.timestamp||"",t.pair||"",t.direction||"",t.entry||"",t.sl||"",t.tp||"",t.lots||"",t.riskPct||"",t.rr||"",r.outcome||"",r.actualPct||"",r.exitWhy||""]);});
    const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download=`NBS_${firm.name.replace(/\s/g,"_")}.csv`;a.click();
  };

  return(
    <div className="fade">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:7}}>
        <button onClick={onBack} style={{...BS,background:"none",border:"1px solid #222",color:"#666",padding:"7px 12px"}}>← Back</button>
        <div style={{display:"flex",gap:6}}>
          <button onClick={dlCSV} style={{...BS,background:"rgba(200,241,53,.07)",border:"1px solid rgba(200,241,53,.17)",color:"#c8f135",padding:"7px 11px"}}>↓ CSV</button>
          <button onClick={()=>setEditMode(!editMode)} style={{...BS,background:editMode?"rgba(56,189,248,.1)":"#111",border:`1px solid ${editMode?"rgba(56,189,248,.25)":"#222"}`,color:editMode?"#38bdf8":"#666",padding:"7px 11px"}}>{editMode?"✕":"✎ Edit"}</button>
          {!firm.isPersonal&&<button onClick={()=>setConfirmDel(true)} style={{...BS,background:"rgba(255,68,68,.07)",border:"1px solid rgba(255,68,68,.17)",color:"#ff6666",padding:"7px 11px"}}>✕ Delete</button>}
        </div>
      </div>

      {confirmDel&&<div style={{background:"rgba(255,68,68,.05)",border:"1px solid rgba(255,68,68,.2)",borderRadius:8,padding:14,marginBottom:12}}>
        <div style={{...mono,fontSize:12,color:"#ff8888",marginBottom:9}}>Delete "{firm.name}"? Cannot be undone.</div>
        <div style={{display:"flex",gap:7}}><button onClick={()=>{onDelete(firm.id);}} style={{...BS,background:"rgba(255,68,68,.14)",border:"1px solid rgba(255,68,68,.3)",color:"#ff4444",padding:"8px 13px"}}>Yes, Delete</button><button onClick={()=>setConfirmDel(false)} style={{...BS,background:"none",border:"1px solid #333",color:"#666",padding:"8px 13px"}}>Cancel</button></div>
      </div>}

      {editMode&&<div style={{background:"#0f0f0f",border:"1px solid #222",borderRadius:9,padding:15,marginBottom:14,display:"flex",flexDirection:"column",gap:9}}>
        <div style={{...mono,fontSize:9,color:"#38bdf8",letterSpacing:3,textTransform:"uppercase"}}>Edit Account</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
          <I label="Name" value={ef.name} onChange={e=>setEf(p=>({...p,name:e.target.value}))}/>
          <I label="Account Size ($)" value={ef.accountSize} onChange={e=>setEf(p=>({...p,accountSize:e.target.value}))}/>
          {!firm.isPersonal&&<><I label="Profit Target (%)" value={ef.profitTarget} onChange={e=>setEf(p=>({...p,profitTarget:e.target.value}))}/><I label="Max Daily Loss (%)" value={ef.maxDaily} onChange={e=>setEf(p=>({...p,maxDaily:e.target.value}))}/><I label="Max Drawdown (%)" value={ef.maxDrawdown} onChange={e=>setEf(p=>({...p,maxDrawdown:e.target.value}))}/></>}
          <Se label="Phase" value={ef.phase} onChange={v=>setEf(p=>({...p,phase:v}))} options={PHASES}/>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}><div style={LB}>Color</div><input type="color" value={ef.color} onChange={e=>setEf(p=>({...p,color:e.target.value}))} style={{width:44,height:32,borderRadius:6}}/></div>
        <button onClick={saveEdit} style={{...BS,background:"rgba(200,241,53,.09)",border:"1px solid rgba(200,241,53,.2)",color:"#c8f135",padding:"11px"}}>Save Changes</button>
      </div>}

      {/* Account header card */}
      <div style={{background:"#0d0d0d",border:`1px solid ${firm.color}22`,borderTop:`3px solid ${firm.color}`,borderRadius:9,padding:16,marginBottom:12}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10,flexWrap:"wrap",marginBottom:12}}>
          <div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:"white"}}>{firm.name}</div>
            <div style={{display:"flex",gap:6,marginTop:3,flexWrap:"wrap"}}>
              {firm.isPersonal&&<Pill label="Personal" col="lime" sm/>}
              <span style={{...mono,fontSize:9,color:ph,border:`1px solid ${ph}44`,padding:"1px 7px",borderRadius:3,letterSpacing:2}}>{firm.phase?.toUpperCase()}</span>
              <span style={{...mono,fontSize:10,color:"#555"}}>${Number(firm.accountSize).toLocaleString()}</span>
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{...mono,fontSize:24,fontWeight:"bold",color:s.np>=0?"#34d399":"#ff4444"}}>{fmtC(s.np)}</div>
            <div style={{...mono,fontSize:10,color:"#555"}}>{fmtP(s.np/firm.accountSize*100)} net</div>
          </div>
        </div>
        <div style={{background:"#090909",borderRadius:8,padding:"9px 9px 4px",marginBottom:firm.profitTarget>0?12:0}}>
          <div style={{...mono,fontSize:9,color:"#444",letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>Equity Curve</div>
          <EquityCurve equity={s.equity}/>
          <div style={{display:"flex",justifyContent:"space-between",...mono,fontSize:10,color:"#444",marginTop:4,padding:"0 2px"}}><span>Start: ${Number(firm.accountSize).toLocaleString()}</span><span style={{color:s.bal>=firm.accountSize?"#34d399":"#ff4444"}}>Now: ${s.bal.toLocaleString(undefined,{maximumFractionDigits:0})}</span></div>
        </div>
        {!firm.isPersonal&&firm.profitTarget>0&&(
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {[["Profit Progress",fmtP(s.np/firm.accountSize*100)+" / "+firm.profitTarget+"%",Math.min(100,Math.max(0,s.np/firm.accountSize*100/firm.profitTarget*100)),"#c8f135"],s.np<0?["Drawdown Used",fmtP(Math.abs(s.np)/firm.accountSize*100)+" / "+firm.maxDrawdown+"%",Math.min(100,Math.abs(s.np)/firm.accountSize*100/firm.maxDrawdown*100),"#ff4444"]:null].filter(Boolean).map(([l,v,pct,c])=>(
              <div key={l}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><div style={{...mono,fontSize:9,color:"#555",letterSpacing:2,textTransform:"uppercase"}}>{l}</div><div style={{...mono,fontSize:10,color:c}}>{v}</div></div><div style={{height:4,background:"#1a1a1a",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:c,borderRadius:2}}/></div></div>
            ))}
          </div>
        )}
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:14}}>
        {[["stats","Stats"],["calendar","Calendar"],["trades","Trades ("+firmTrades.length+")"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{...BS,padding:"7px 13px",fontSize:9,background:tab===id?"#171717":"none",border:`1px solid ${tab===id?"#252525":"#131313"}`,color:tab===id?"white":"#555"}}>{label}</button>
        ))}
      </div>

      {tab==="stats"&&<div className="fade">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
          <StatTile label="Balance" value={`$${s.bal.toLocaleString(undefined,{maximumFractionDigits:0})}`}/>
          <StatTile label="HWM" value={`$${s.hwm.toLocaleString(undefined,{maximumFractionDigits:0})}`} sub={s.hwmDate||""} col="#c8f135"/>
          <StatTile label="Net Profit" value={fmtC(s.np)} sub={fmtP(s.np/firm.accountSize*100)} col={s.np>=0?"#34d399":"#ff4444"}/>
          <StatTile label="Profit Factor" value={s.pf>=99?"∞":s.pf.toFixed(2)} col={s.pf>=1.5?"#34d399":s.pf>=1?"#f0a500":"#ff4444"}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:8}}>
          <StatTile label="Trades" value={s.tot}/>
          <StatTile label="Win Rate" value={s.tot?s.winRate+"%":"–"} col={s.winRate>=50?"#34d399":s.winRate>=40?"#f0a500":"#ff4444"}/>
          <StatTile label="Wins" value={s.wins} col="#34d399"/>
          <StatTile label="Losses" value={s.losses} col="#ff4444"/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}}>
          <StatTile label="Best Trade" value={fmtC(s.best)} col="#34d399"/>
          <StatTile label="Worst Trade" value={fmtC(s.worst)} col="#ff4444"/>
          <StatTile label="Expectancy" value={fmtC(s.exp)} sub="per trade" col={s.exp>=0?"#c8f135":"#ff4444"}/>
          <StatTile label="Avg Duration" value={s.avgDur?Math.round(s.avgDur)+"h":"–"} col="#888"/>
        </div>
        {s.weekly.length>0&&<div style={{background:"#0d0d0d",border:"1px solid #161616",borderRadius:8,padding:13}}>
          <div style={{...mono,fontSize:9,color:"#555",letterSpacing:3,textTransform:"uppercase",marginBottom:10}}>Weekly</div>
          {s.weekly.map(w=><div key={w.week} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:"1px solid #111"}}>
            <div style={{...mono,fontSize:10,color:"#555",minWidth:80}}>w/{w.week}</div>
            <div style={{...mono,fontSize:10,color:"#34d399",minWidth:28}}>{w.wins}W</div>
            <div style={{...mono,fontSize:10,color:"#ff4444",minWidth:28}}>{w.losses}L</div>
            <div style={{flex:1,height:3,background:"#141414",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:w.trades?`${w.wins/w.trades*100}%`:"0%",background:"#34d399",borderRadius:2}}/></div>
            <div style={{...mono,fontSize:11,color:w.pnl>=0?"#34d399":"#ff4444",minWidth:60,textAlign:"right"}}>{fmtC(w.pnl)}</div>
          </div>)}
        </div>}
      </div>}

      {tab==="calendar"&&<div className="fade"><CalendarView trades={firmTrades} title={firm.name}/></div>}

      {tab==="trades"&&<div className="fade">
        <div style={{...mono,fontSize:10,color:"#555",marginBottom:10,lineHeight:1.7}}>
          {firmTrades.length} trades · tap to expand · outcome is <span style={{color:firm.color}}>independent for {firm.name}</span>
        </div>
        {firmTrades.length===0
          ?<div style={{textAlign:"center",padding:"36px",...mono,fontSize:12,color:"#2a2a2a"}}>No trades yet for this account.</div>
          :firmTrades.sort((a,b)=>(parseDate(b.timestamp)||0)-(parseDate(a.timestamp)||0)).map(t=>(
            <TradeCard key={t.id} trade={t} onUpdate={onUpdateTrade} onDelete={onDeleteTrade} firms={firms} firmId={firm.id}/>
          ))
        }
      </div>}
    </div>
  );
}

// ═══════ FIRMS LIST ═══════
function FirmsPage({firms,trades,onUpdate,onDelete,onAdd,onReorder,onUpdateTrade,onDeleteTrade}){
  const[view,setView]=useState("list");
  const[selId,setSelId]=useState(null);
  const[phaseTab,setPhaseTab]=useState("All");
  const[af,setAf]=useState({name:"",color:"#3b82f6",accountSize:"100000",profitTarget:"10",maxDaily:"5",maxDrawdown:"10",phase:"Challenge",isPersonal:false});

  if(view==="detail"&&selId){
    const firm=firms.find(f=>f.id===selId);
    if(firm)return<FirmDetail firm={firm} trades={trades} firms={firms} onBack={()=>setView("list")} onUpdate={(id,d)=>onUpdate(id,d)} onDelete={(id)=>{onDelete(id);setView("list");}} onUpdateTrade={onUpdateTrade} onDeleteTrade={onDeleteTrade}/>;
  }

  if(view==="add")return(
    <div className="fade">
      <button onClick={()=>setView("list")} style={{...BS,background:"none",border:"1px solid #222",color:"#555",marginBottom:16,padding:"7px 12px"}}>← Back</button>
      <div style={{...mono,fontSize:9,letterSpacing:3,color:"#c8f135",textTransform:"uppercase",marginBottom:12,borderLeft:"2px solid #c8f135",paddingLeft:10}}>+ Add Account</div>
      <div style={{display:"flex",flexDirection:"column",gap:9,maxWidth:460}}>
        <div style={{display:"flex",gap:7}}>
          {[["Personal",true],["Prop Firm",false]].map(([l,v])=><button key={l} onClick={()=>setAf(p=>({...p,isPersonal:v}))} style={{flex:1,padding:"9px 0",border:`1px solid ${af.isPersonal===v?"rgba(200,241,53,.4)":"#1e1e1e"}`,background:af.isPersonal===v?"rgba(200,241,53,.09)":"#111",color:af.isPersonal===v?"#c8f135":"#555",borderRadius:6,cursor:"pointer",...mono,fontSize:11,letterSpacing:2,textTransform:"uppercase"}}>{l}</button>)}
        </div>
        <I label="Account Name" value={af.name} onChange={e=>setAf(p=>({...p,name:e.target.value}))} placeholder="e.g. FTMO #2"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
          <I label="Account Size ($)" value={af.accountSize} onChange={e=>setAf(p=>({...p,accountSize:e.target.value}))}/>
          <Se label="Phase" value={af.phase} onChange={v=>setAf(p=>({...p,phase:v}))} options={PHASES}/>
          {!af.isPersonal&&<><I label="Profit Target (%)" value={af.profitTarget} onChange={e=>setAf(p=>({...p,profitTarget:e.target.value}))}/><I label="Max Daily Loss (%)" value={af.maxDaily} onChange={e=>setAf(p=>({...p,maxDaily:e.target.value}))}/><I label="Max Drawdown (%)" value={af.maxDrawdown} onChange={e=>setAf(p=>({...p,maxDrawdown:e.target.value}))}/></>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}><div style={LB}>Color</div><input type="color" value={af.color} onChange={e=>setAf(p=>({...p,color:e.target.value}))} style={{width:44,height:32,borderRadius:6}}/></div>
        <button onClick={()=>{if(!af.name)return;onAdd({...af,accountSize:parseFloat(af.accountSize),profitTarget:parseFloat(af.profitTarget)||0,maxDaily:parseFloat(af.maxDaily)||0,maxDrawdown:parseFloat(af.maxDrawdown)||0,id:Date.now()});setView("list");}} style={{...BS,background:"rgba(200,241,53,.09)",border:"1px solid rgba(200,241,53,.2)",color:"#c8f135",padding:"12px"}}>Add Account</button>
      </div>
    </div>
  );

  const phaseColors={Personal:"#c8f135",Challenge:"#c8f135",Verification:"#38bdf8",Funded:"#34d399",Passed:"#a78bfa",Failed:"#ff4444",Live:"#34d399",All:"#888"};
  const filteredFirms=firms.filter(f=>phaseTab==="All"?true:phaseTab==="Personal"?f.isPersonal:!f.isPersonal&&f.phase===phaseTab);

  return(
    <div className="fade">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:7}}>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:"white"}}>Trading Accounts</div>
        <button onClick={()=>setView("add")} style={{...BS,background:"rgba(200,241,53,.07)",border:"1px solid rgba(200,241,53,.17)",color:"#c8f135",padding:"8px 13px"}}>+ Add Account</button>
      </div>
      <div style={{display:"flex",gap:4,marginBottom:14,overflowX:"auto",paddingBottom:2}}>
        {["All","Personal","Challenge","Verification","Funded","Passed","Failed","Live"].filter(ph=>ph==="All"?true:ph==="Personal"?firms.some(f=>f.isPersonal):firms.some(f=>!f.isPersonal&&f.phase===ph)).map(ph=>{
          const count=ph==="All"?firms.length:ph==="Personal"?firms.filter(f=>f.isPersonal).length:firms.filter(f=>!f.isPersonal&&f.phase===ph).length;
          const isActive=phaseTab===ph;const c=phaseColors[ph]||"#888";
          return<button key={ph} onClick={()=>setPhaseTab(ph)} style={{...BS,padding:"6px 11px",fontSize:9,flexShrink:0,background:isActive?c+"18":"none",border:"1px solid "+(isActive?c+"55":"#1a1a1a"),color:isActive?c:"#555"}}>{ph} <span style={{opacity:.6}}>({count})</span></button>;
        })}
      </div>
      {filteredFirms.map(f=>{
        const ft=trades.filter(t=>(t.firmIds||[]).includes(f.id));
        const s=calcStats(ft,f.accountSize,f.id);
        const pct=f.accountSize?s.np/f.accountSize*100:0;
        const phC={Challenge:"#c8f135",Verification:"#38bdf8",Funded:"#34d399",Passed:"#a78bfa",Failed:"#ff4444",Live:"#34d399"};
        return(
          <div key={f.id} style={{background:"#0d0d0d",border:"1px solid "+f.color+"1a",borderLeft:"3px solid "+f.color,borderRadius:9,padding:"12px 14px",marginBottom:7,display:"flex",alignItems:"center",gap:9,flexWrap:"wrap",cursor:"pointer",transition:"background .12s"}}
            onClick={()=>{setSelId(f.id);setView("detail");}}
            onMouseEnter={e=>e.currentTarget.style.background="#111"}
            onMouseLeave={e=>e.currentTarget.style.background="#0d0d0d"}>

// ═══════ STATS BAR ═══════
function StatsBar({trades}){
  const cl=trades.filter(t=>{const r=getAccResult(t,null);return r.outcome&&!r.outcome.includes("Running");});
  const wins=cl.filter(t=>getAccResult(t,null).outcome?.includes("Win")).length;
  const wr=cl.length?Math.round(wins/cl.length*100)+"%":"–";
  const net=cl.reduce((s,t)=>s+(parseFloat(getAccResult(t,null).actualPct)||0),0);
  const avg=cl.length?(net/cl.length).toFixed(2):null;
  return<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5,marginBottom:14}}>
    {[[`${trades.length}`,"Trades","#e0e0e0"],[wr,"Win Rate",cl.length&&wins/cl.length>=0.4?"#34d399":"#ff4444"],[(net?(net>=0?"+":"")+net.toFixed(2)+"%":"–"),"Net P&L",net>=0?"#34d399":"#ff4444"],[(avg?(parseFloat(avg)>=0?"+":"")+avg+"%":"–"),"Avg/Trade","#38bdf8"]].map(([v,l,c])=>(
      <div key={l} style={{background:"#0c0c0c",border:"1px solid #151515",borderRadius:7,padding:"9px 6px",textAlign:"center"}}>
        <div style={{...mono,fontSize:16,fontWeight:"bold",color:c}}>{v}</div>
        <div style={{...mono,fontSize:9,color:"#3a3a3a",letterSpacing:2,textTransform:"uppercase",marginTop:2}}>{l}</div>
      </div>
    ))}
  </div>;
}

          React.createElement("button",{onClick:connectExisting,disabled:loading,style:{...bigBtn,background:"rgba(56,189,248,.1)",color:"#38bdf8",border:"1px solid rgba(56,189,248,.2)"}},loading?"Connecting...":"Connect & Load Data"),
          React.createElement("button",{onClick:function(){setStep("intro");setErr("");},style:{...BS,background:"none",border:"1px solid #1e1e1e",color:"#555",marginTop:10,width:"100%"}},"Back")
        )
      )
    )
  );
}

// ═══════ MAIN APP ═══════
function App(){
  var[trades,setTrades]=useState([]);
  var[firms,setFirms]=useState(DEFAULT_FIRMS);
  var[rules,setRules]=useState(DEFAULT_RULES);
  var[page,setPage]=useState("journal");
  var[filter,setFilter]=useState("all");
  var[showCloudSetup,setShowCloudSetup]=useState(false);
  var[creds,setCreds]=useState(null);
  var[syncStatus,setSyncStatus]=useState("");
  var[syncMsg,setSyncMsg]=useState("");
  var[installPrompt,setInstallPrompt]=useState(null);
  var saveTimer=useRef(null);
  var isLoading=useRef(true);

  useEffect(function(){
    var lsData=LS.read();
    if(lsData){setTrades(lsData.trades||[]);setFirms(lsData.firms||DEFAULT_FIRMS);if(lsData.rules)setRules(lsData.rules);}
    var c=CREDS.get();
    if(c&&c.apiKey&&c.binId){
      setCreds(c);setSyncStatus("syncing");setSyncMsg("Syncing...");
      CLOUD.read(c.binId,c.apiKey).then(function(data){if(data){setTrades(data.trades||[]);setFirms(data.firms||DEFAULT_FIRMS);if(data.rules)setRules(data.rules);}setSyncStatus("synced");setSyncMsg("Synced "+new Date().toLocaleTimeString()+" — "+c.binId.substring(0,8)+"...");isLoading.current=false;}).catch(function(e){setSyncStatus("error");setSyncMsg("Sync failed: "+e.message);isLoading.current=false;});
    } else {setSyncMsg("Saved locally");isLoading.current=false;}
    var h=function(e){e.preventDefault();setInstallPrompt(e);};window.addEventListener("beforeinstallprompt",h);return function(){window.removeEventListener("beforeinstallprompt",h);};
  },[]);

  function saveAll(t,f,r){
    var data={trades:t,firms:f,rules:r,savedAt:new Date().toISOString()};LS.write(data);
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(function(){
      var c=CREDS.get();
      if(c&&c.binId&&c.apiKey){setSyncStatus("syncing");setSyncMsg("Saving...");CLOUD.write(c.binId,c.apiKey,data).then(function(){setSyncStatus("synced");setSyncMsg("Saved "+new Date().toLocaleTimeString());}).catch(function(){setSyncStatus("error");setSyncMsg("Cloud save failed — kept locally");});}
      else setSyncMsg("Saved locally");
    },1500);
  }
  useEffect(function(){if(!isLoading.current)saveAll(trades,firms,rules);},[trades,firms,rules]);

  function manualSync(){var c=CREDS.get();if(!c){setShowCloudSetup(true);return;}setSyncStatus("syncing");setSyncMsg("Syncing...");CLOUD.read(c.binId,c.apiKey).then(function(data){if(data){setTrades(data.trades||[]);setFirms(data.firms||DEFAULT_FIRMS);if(data.rules)setRules(data.rules);}setSyncStatus("synced");setSyncMsg("Synced "+new Date().toLocaleTimeString());}).catch(function(e){setSyncStatus("error");setSyncMsg("Sync failed: "+e.message);});}
  function exportBackup(){var a=document.createElement("a");a.href="data:application/json;charset=utf-8,"+encodeURIComponent(JSON.stringify({trades,firms,rules,savedAt:new Date().toISOString()},null,2));a.download="NBS_Backup_"+new Date().toISOString().substring(0,10)+".json";a.click();}
  function importBackup(){var inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(d.trades)setTrades(d.trades);if(d.firms)setFirms(d.firms);if(d.rules)setRules(d.rules);alert("Imported "+(d.trades?.length||0)+" trades.");}catch(ex){alert("Invalid backup file.");}};r.readAsText(f);};inp.click();}

  if(showCloudSetup)return React.createElement(CloudSetup,{onDone:function(c,data){if(c){setCreds(c);if(data){setTrades(data.trades||[]);setFirms(data.firms||DEFAULT_FIRMS);if(data.rules)setRules(data.rules);}setSyncMsg("Cloud active — "+c.binId.substring(0,8)+"...");setSyncStatus("synced");}else{setSyncMsg("Saved locally");setSyncStatus("");}setShowCloudSetup(false);}});

  var filtered=trades.filter(function(t){if(filter==="all")return true;if(filter==="open"){const r=getAccResult(t,null);return !r.outcome||r.outcome.includes("Running");}const r=getAccResult(t,null);return r.outcome&&r.outcome.includes(filter);});
  function addTrade(t){setTrades(function(p){return [t].concat(p);});}
  function updateTrade(id,data){setTrades(function(p){return p.map(function(t){return t.id===id?Object.assign({},t,data):t;});});}
  function deleteTrade(id){if(window.confirm("Delete this trade?"))setTrades(function(p){return p.filter(function(t){return t.id!==id;});});}
  function addFirm(f){setFirms(function(p){return p.concat([f]);});}
  function updateFirm(id,data){setFirms(function(p){return p.map(function(f){return f.id===id?Object.assign({},f,data):f;});});}
  function deleteFirm(id){setFirms(function(p){return p.filter(function(f){return f.id!==id;});});setTrades(function(p){return p.map(function(t){return Object.assign({},t,{firmIds:(t.firmIds||[]).filter(function(x){return x!==id;})});});});}

  var syncColor=syncStatus==="synced"?"#34d399":syncStatus==="syncing"?"#f0a500":syncStatus==="error"?"#ff4444":"#444";
  var navItems=[{id:"journal",l:"Journal"},{id:"calendar",l:"Calendar"},{id:"firms",l:"Accounts"},{id:"rules",l:"Rules"},{id:"news",l:"News"},{id:"new",l:"+ Trade"}];

  return(
    <div style={{minHeight:"100vh",background:"#070707"}}>
      <div style={{position:"sticky",top:0,zIndex:50,background:"rgba(7,7,7,.97)",backdropFilter:"blur(14px)",borderBottom:"1px solid #111"}}>
        <div style={{maxWidth:720,margin:"0 auto",padding:"9px 13px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:7,flexWrap:"wrap"}}>
          <div>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:4,color:"#c8f135",textTransform:"uppercase",marginBottom:1}}>NBS Trading</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:1,color:"white",lineHeight:1}}>Trade Journal v11</div>
          </div>
          <div style={{display:"flex",gap:3,flexWrap:"wrap",alignItems:"center"}}>
            {navItems.map(function(n){return<button key={n.id} onClick={function(){setPage(n.id);}} style={{...BS,padding:"6px 10px",fontSize:10,background:page===n.id?(n.id==="new"?"rgba(200,241,53,.12)":"#171717"):"none",border:"1px solid "+(page===n.id?(n.id==="new"?"rgba(200,241,53,.25)":"#252525"):"transparent"),color:page===n.id?(n.id==="new"?"#c8f135":"white"):"#555"}}>{n.l}</button>;})}
            <div style={{display:"flex",gap:3,marginLeft:3}}>
              <button onClick={syncStatus==="error"?function(){CREDS.clear();setCreds(null);setShowCloudSetup(true);}:creds?manualSync:function(){setShowCloudSetup(true);}} style={{...BS,padding:"6px 9px",fontSize:9,background:syncStatus==="error"?"rgba(255,68,68,.1)":"none",border:"1px solid "+(syncStatus==="error"?"rgba(255,68,68,.3)":creds?"#1e1e1e":"rgba(56,189,248,.2)"),color:creds?syncColor:"#38bdf8"}}>{syncStatus==="error"?"! fix":creds?(syncStatus==="syncing"?"~":"⊙"):"+ Sync"}</button>
              <button onClick={exportBackup} style={{...BS,padding:"6px 9px",fontSize:9,background:"none",border:"1px solid #1e1e1e",color:"#555"}}>save</button>
              <button onClick={importBackup} style={{...BS,padding:"6px 9px",fontSize:9,background:"none",border:"1px solid #1e1e1e",color:"#555"}}>load</button>
              {installPrompt&&<button onClick={function(){installPrompt.prompt();}} style={{...BS,padding:"6px 9px",fontSize:9,background:"rgba(200,241,53,.08)",border:"1px solid rgba(200,241,53,.2)",color:"#c8f135"}}>install</button>}
            </div>
          </div>
        </div>
        {syncMsg&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:syncColor,letterSpacing:1,textAlign:"center",padding:"2px 0 4px",borderTop:"1px solid #0e0e0e"}}>{syncMsg}</div>}
      </div>

      <div style={{maxWidth:720,margin:"0 auto",padding:"15px 13px"}}>
        {page==="new"&&<NewTradeForm onSave={function(t){addTrade(t);setPage("journal");}} onCancel={function(){setPage("journal");}} firms={firms}/>}
        {page==="journal"&&<div className="fade">
          <StatsBar trades={trades}/>
          <div style={{display:"flex",gap:4,marginBottom:11,flexWrap:"wrap"}}>
            {["all","open","Win","Loss","Breakeven"].map(function(f){return<button key={f} onClick={function(){setFilter(f);}} style={{...BS,padding:"5px 9px",fontSize:9,background:filter===f?"#171717":"none",border:"1px solid "+(filter===f?"#252525":"#111"),color:filter===f?"white":"#444"}}>{f}</button>;})}
          </div>
          {filtered.length===0?<div style={{textAlign:"center",padding:"60px 0",fontFamily:"'DM Mono',monospace",fontSize:12,color:"#222"}}>{trades.length===0?"No trades yet — tap + Trade":"No trades match filter"}</div>
          :filtered.map(function(t){return<TradeCard key={t.id} trade={t} onUpdate={updateTrade} onDelete={deleteTrade} firms={firms} firmId={null}/>;})}
        </div>}
        {page==="calendar"&&<div className="fade"><CalendarView trades={trades} title="All Accounts"/></div>}
        {page==="firms"&&<FirmsPage firms={firms} trades={trades} onUpdate={updateFirm} onDelete={deleteFirm} onAdd={addFirm} onReorder={function(arr){setFirms(arr);}} onUpdateTrade={updateTrade} onDeleteTrade={deleteTrade}/>}
        {page==="rules"&&<RulesPage rules={rules} onUpdate={function(r){setRules(r);}}/>}
        {page==="news"&&<ForexNews/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
