const LS={
  read(){try{var d=localStorage.getItem("nbs7");return d?JSON.parse(d):null;}catch(e){return null;}},
  write(data){try{localStorage.setItem("nbs7",JSON.stringify(data));}catch(e){}}

const CREDS={
  get(){try{return JSON.parse(localStorage.getItem("nbs7_creds")||"null");}catch(e){return null;}},

  clear(){localStorage.removeItem("nbs7_creds");}
};
const CLOUD={
  BASE:"https://api.github.com/gists",
  async createBin(token){
    var r=await fetch(this.BASE,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"token "+token,"Accept":"application/vnd.github+json"},body:JSON.stringify({description:"NBS Trading Journal",public:false,files:{"nbs_data.json":{content:JSON.stringify({trades:[],firms:[],createdAt:new Date().toISOString()})}}})});
    if(!r.ok)throw new Error("Bad token ("+r.status+") - make sure you ticked the gist checkbox");
    var j=await r.json();return j.id;
  },
  async read(gistId,token){
    var r=await fetch(this.BASE+"/"+gistId,{headers:{"Authorization":"token "+token,"Accept":"application/vnd.github+json"}});
    if(!r.ok)throw new Error("Could not read gist ("+r.status+")");
    var j=await r.json();
    var raw=j.files&&j.files["nbs_data.json"]&&j.files["nbs_data.json"].content;
    if(!raw)throw new Error("No data found in gist");
    return JSON.parse(raw);
  },
  async write(gistId,token,data){
    var r=await fetch(this.BASE+"/"+gistId,{method:"PATCH",headers:{"Content-Type":"application/json","Authorization":"token "+token,"Accept":"application/vnd.github+json"},body:JSON.stringify({files:{"nbs_data.json":{content:JSON.stringify(data)}}})});
    if(!r.ok)throw new Error("Save failed ("+r.status+")");
    return true;
  }
};

const mono={fontFamily:"'DM Mono',monospace"};
const nowTs=()=>new Date().toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit",hour12:false}).replace(","," —");
const scoreEntry=f=>[f.c1,f.c2,f.c3,f.c4,f.c5,f.c6,f.c7,f.c8].filter(Boolean).length;
const pipSz=p=>p?.toUpperCase().includes("JPY")?0.01:0.0001;
const pipVal=(p,price)=>p?.toUpperCase().includes("JPY")?1000/(price||150):10;
const calcLots=(pair,entry,sl,riskPct,acct)=>{
  const[e,s,r,a]=[parseFloat(entry),parseFloat(sl),parseFloat(riskPct),parseFloat(acct)];
  if(!e||!s||!r||!a||e===s)return null;
  return Math.floor((a*r/100)/(Math.abs(e-s)/pipSz(pair)*pipVal(pair,e))*100)/100;
};
const calcRR=(e,sl,tp,dir)=>{
  const[ev,sv,tv]=[parseFloat(e),parseFloat(sl),parseFloat(tp)];
  if(!ev||!sv||!tv||ev===sv)return null;
  return parseFloat(((dir==="BUY"?tv-ev:ev-tv)/Math.abs(ev-sv)).toFixed(2));
};
const rrC=r=>r>=4?"#34d399":r>=2?"#c8f135":r>=1?"#f0a500":"#ff4444";
const tradePnlDollar=(t,acct)=>{const p=parseFloat(t.actualPct);return isNaN(p)?null:(parseFloat(acct)||100000)*p/100;};
const parseDate=ts=>{if(!ts)return null;try{const d=new Date(ts.replace(" — "," "));return isNaN(d)?null:d;}catch{return null;}};
const dKey=d=>{if(!d)return null;const dt=d instanceof Date?d:new Date(d);if(isNaN(dt))return null;return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;};
const addDays=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
const fmtC=n=>{if(n==null||isNaN(n))return"–";const s=Math.abs(n)>=1000?`$${(Math.abs(n)/1000).toFixed(1)}k`:`$${Math.abs(n).toFixed(0)}`;return n<0?`-${s}`:`+${s}`;};
const fmtP=n=>n==null||isNaN(n)?"–":(n>=0?"+":"")+n.toFixed(2)+"%";
const getWk=d=>{const t=new Date(d);t.setHours(0,0,0,0);const day=t.getDay()||7;t.setDate(t.getDate()+1-day);return t.toISOString().substring(0,10);};

// ═══════════════════════════════════════════════════════════
// ANALYTICS
// ═══════════════════════════════════════════════════════════
function calcStats(trades,acctSize){
  const closed=trades.filter(t=>t.outcome&&!t.outcome.includes("Running")&&t.actualPct!=null&&t.actualPct!=="");
  const winT=closed.filter(t=>parseFloat(t.actualPct)>0);
  const losT=closed.filter(t=>parseFloat(t.actualPct)<0);
  const[tot,wins,losses]=[closed.length,winT.length,losT.length];
  const gp=winT.reduce((s,t)=>s+(tradePnlDollar(t,acctSize)||0),0);
  const gl=Math.abs(losT.reduce((s,t)=>s+(tradePnlDollar(t,acctSize)||0),0));
  const np=gp-gl,pf=gl>0?gp/gl:wins>0?99:0;
  const aw=wins?gp/wins:0,al=losses?gl/losses:0;
  const exp=tot?(wins/tot*aw)-(losses/tot*al):0;
  const best=closed.reduce((b,t)=>Math.max(b,tradePnlDollar(t,acctSize)||0),-Infinity);
  const worst=closed.reduce((b,t)=>Math.min(b,tradePnlDollar(t,acctSize)||0),Infinity);
  const avgSz=closed.length?closed.reduce((s,t)=>s+(parseFloat(t.lots)||0),0)/closed.length:0;
  const durs=closed.filter(t=>t.exitTimestamp&&t.timestamp).map(t=>{const en=parseDate(t.timestamp),ex=new Date(t.exitTimestamp);return(!en||isNaN(ex))?null:Math.max(0,Math.round((ex-en)/3600000));}).filter(d=>d!==null);
  const avgDur=durs.length?durs.reduce((a,b)=>a+b,0)/durs.length:0;
  const sorted=[...closed].sort((a,b)=>(parseDate(a.timestamp)||0)-(parseDate(b.timestamp)||0));
  let bal=parseFloat(acctSize)||100000,hwm=bal,hwmDate=null;
  const equity=[{bal}];
  sorted.forEach(t=>{const pnl=tradePnlDollar(t,acctSize)||0;bal+=pnl;if(bal>hwm){hwm=bal;hwmDate=t.timestamp?.substring(0,9);}equity.push({date:t.timestamp?.substring(0,9)||"",bal,pnl,pair:t.pair,outcome:t.outcome});});
  const wkMap={};
  closed.forEach(t=>{const d=parseDate(t.timestamp);if(!d)return;const wk=getWk(d);if(!wkMap[wk])wkMap[wk]={week:wk,trades:0,wins:0,losses:0,pnl:0};const pnl=tradePnlDollar(t,acctSize)||0;wkMap[wk].trades++;if(pnl>0)wkMap[wk].wins++;else if(pnl<0)wkMap[wk].losses++;wkMap[wk].pnl+=pnl;});
  const weekly=Object.values(wkMap).sort((a,b)=>b.week>a.week?1:-1).slice(-12);
  const splitSt=dir=>{const tr=closed.filter(t=>t.direction===dir);const w=tr.filter(t=>parseFloat(t.actualPct)>0).length;return{total:tr.length,wins:w,losses:tr.length-w,wr:tr.length?Math.round(w/tr.length*100):0,pnl:tr.reduce((s,t)=>s+(tradePnlDollar(t,acctSize)||0),0)};};
  return{tot,wins,losses,winRate:tot?Math.round(wins/tot*100):0,gp,gl,np,pf,best:best===-Infinity?0:best,worst:worst===Infinity?0:worst,exp,avgSz,avgDur,equity,bal,hwm,hwmDate,pnlHwm:bal-hwm,weekly,long:splitSt("BUY"),short:splitSt("SELL")};
}

// ═══════════════════════════════════════════════════════════
// EQUITY CURVE
// ═══════════════════════════════════════════════════════════
function EquityCurve({equity}){
  if(!equity||equity.length<2)return<div style={{height:120,display:"flex",alignItems:"center",justifyContent:"center",...mono,fontSize:11,color:"#2a2a2a"}}>No closed trades yet</div>;
  const bals=equity.map(e=>e.bal),mn=Math.min(...bals),mx=Math.max(...bals),rng=mx-mn||1;
  const W=500,H=110,P=8,x=i=>(i/(equity.length-1))*(W-P*2)+P,y=b=>H-P-(b-mn)/rng*(H-P*2);
  const pts=equity.map((e,i)=>`${x(i).toFixed(1)},${y(e.bal).toFixed(1)}`).join(" ");
  const isUp=equity[equity.length-1].bal>=equity[0].bal,lc=isUp?"#34d399":"#ff4444";
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:120,display:"block"}} preserveAspectRatio="none">
      <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={lc} stopOpacity=".18"/><stop offset="100%" stopColor={lc} stopOpacity="0"/></linearGradient></defs>
      <polygon points={`${x(0).toFixed(1)},${H} ${pts} ${x(equity.length-1).toFixed(1)},${H}`} fill="url(#g)"/>
      <polyline points={pts} fill="none" stroke={lc} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
      <line x1={P} y1={y(equity[0].bal)} x2={W-P} y2={y(equity[0].bal)} stroke="#2a2a2a" strokeWidth="0.5" strokeDasharray="3,3"/>
      {equity.map((e,i)=>e.pnl!=null&&<circle key={i} cx={x(i)} cy={y(e.bal)} r="2.2" fill={e.pnl>=0?"#34d399":"#ff4444"} opacity=".7"/>)}
    </svg>
  );
}

const IS={background:"#111",border:"1px solid #1e1e1e",borderRadius:6,padding:"9px 12px",fontSize:13,...mono,color:"#e0e0e0",width:"100%",outline:"none"};
const BS={padding:"9px 16px",borderRadius:6,border:"none",cursor:"pointer",...mono,fontSize:11,letterSpacing:2,textTransform:"uppercase"};
const LB={...mono,fontSize:9,letterSpacing:3,textTransform:"uppercase",color:"#555"};

function F({label,children}){return<div style={{display:"flex",flexDirection:"column",gap:4}}>{label&&<div style={LB}>{label}</div>}{children}</div>;}
function I({label,...p}){return<F label={label}><input {...p} style={IS} onFocus={e=>e.target.style.borderColor="#c8f13540"} onBlur={e=>e.target.style.borderColor="#1e1e1e"}/></F>;}
function Se({label,value,onChange,options,ph}){return<F label={label}><select value={value} onChange={e=>onChange(e.target.value)} style={{...IS,appearance:"none"}}><option value="">{ph||"Select..."}</option>{options.map(o=><option key={o} value={o}>{o}</option>)}</select></F>;}
function TA({label,rows=3,...p}){return<F label={label}><textarea rows={rows} {...p} style={{...IS,resize:"none",lineHeight:1.6}}/></F>;}
function Pill({label,col="zinc",sm}){
  const m={green:"rgba(52,211,153,.14),#34d399",red:"rgba(255,68,68,.14),#ff4444",amber:"rgba(240,165,0,.14),#f0a500",sky:"rgba(56,189,248,.14),#38bdf8",lime:"rgba(200,241,53,.14),#c8f135",violet:"rgba(167,139,250,.14),#a78bfa",zinc:"#1a1a1a,#555",blue:"rgba(59,130,246,.14),#60a5fa"};
  const[bg,txt]=(m[col]||m.zinc).split(",");
  return<span style={{...mono,fontSize:sm?8:9,letterSpacing:1.5,textTransform:"uppercase",padding:sm?"1px 5px":"2px 7px",borderRadius:4,background:bg,color:txt,border:`1px solid ${txt}33`,whiteSpace:"nowrap"}}>{label}</span>;
}
function Chk({label,sub,checked,onChange,warn}){
  const c=warn?"#ff4444":"#34d399";
  return<div onClick={()=>onChange(!checked)} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 12px",borderRadius:7,cursor:"pointer",userSelect:"none",background:checked?(warn?"rgba(255,68,68,.05)":"rgba(52,211,153,.05)"):"#0f0f0f",border:`1px solid ${checked?(warn?"rgba(255,68,68,.17)":"rgba(52,211,153,.17)"):"#191919"}`,transition:"all .15s"}}>
    <div style={{width:16,height:16,minWidth:16,borderRadius:3,marginTop:1,display:"flex",alignItems:"center",justifyContent:"center",background:checked?c:"transparent",border:`1.5px solid ${checked?c:"#444"}`,transition:"all .15s",flexShrink:0}}>

  </div>;
}
function ScoreBadge({score}){
  const[l,c,bg]=score>=7?["✅  A+ TAKE IT","#34d399","rgba(52,211,153,.06)"]:score>=5?["⚠️  BORDERLINE","#f0a500","rgba(240,165,0,.06)"]:["❌  DO NOT ENTER","#ff4444","rgba(255,68,68,.06)"];

    :<div onClick={()=>ref.current?.click()} style={{border:"1px dashed #222",borderRadius:7,padding:18,textAlign:"center",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.borderColor="#c8f13530"} onMouseLeave={e=>e.currentTarget.style.borderColor="#222"}><div style={{fontSize:20,marginBottom:2}}>📷</div><div style={{...mono,fontSize:11,color:"#555"}}>Upload chart screenshot</div></div>}
    <input ref={ref} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>onChange(ev.target.result);r.readAsDataURL(f);}}/>
  </F>;

function SH({n,t,col}){const cols={lime:"#c8f135",sky:"#38bdf8",emerald:"#34d399",amber:"#f0a500",violet:"#a78bfa",red:"#ff4444",zinc:"#444"};const c=cols[col]||cols.zinc;return<div style={{borderLeft:`2px solid ${c}`,paddingLeft:12,marginBottom:10}}><div style={{...mono,fontSize:9,letterSpacing:3,textTransform:"uppercase",color:c}}>{n} — {t}</div></div>;}
function Divider({t}){return<div style={{display:"flex",alignItems:"center",gap:8,margin:"2px 0"}}><div style={{flex:1,height:1,background:"#191919"}}/><div style={{...mono,fontSize:9,color:"#444",letterSpacing:2,textTransform:"uppercase",whiteSpace:"nowrap"}}>{t}</div><div style={{flex:1,height:1,background:"#191919"}}/></div>;}
function StatTile({label,value,sub,col}){return<div style={{background:"#0d0d0d",border:"1px solid #161616",borderRadius:8,padding:"11px 12px"}}><div style={{...mono,fontSize:9,color:"#444",letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>{label}</div><div style={{...mono,fontSize:17,fontWeight:"bold",color:col||"#e0e0e0",lineHeight:1.1}}>{value}</div>{sub&&<div style={{...mono,fontSize:10,color:"#555",marginTop:2}}>{sub}</div>}</div>;}
function LotCalc({pair,entry,sl,riskPct,accountSize}){
  if(!entry||!sl||!pair||!riskPct)return null;
  const configs=[["$100k",calcLots(pair,entry,sl,riskPct,100000)],["$200k",calcLots(pair,entry,sl,riskPct,200000)]];
  if(accountSize&&accountSize!="100000"&&accountSize!="200000")configs.push([`$${Number(accountSize).toLocaleString()}`,calcLots(pair,entry,sl,riskPct,accountSize)]);
  const slPips=entry&&sl?(Math.abs(parseFloat(entry)-parseFloat(sl))/pipSz(pair)).toFixed(1):null;
  return<div style={{background:"rgba(200,241,53,.04)",border:"1px solid rgba(200,241,53,.14)",borderRadius:8,padding:12}}>
    <div style={{...mono,fontSize:9,letterSpacing:3,color:"#c8f135",textTransform:"uppercase",marginBottom:8}}>Auto Lot Calculator — {riskPct}% Risk</div>
    <div style={{display:"grid",gridTemplateColumns:`repeat(${configs.length},1fr)`,gap:6}}>
      {configs.map(([label,val])=><div key={label} style={{background:"#111",borderRadius:6,padding:"8px 10px",textAlign:"center"}}><div style={{...mono,fontSize:9,color:"#555",marginBottom:2}}>{label}</div><div style={{...mono,fontSize:17,fontWeight:"bold",color:"#c8f135"}}>{val||"–"}</div><div style={{...mono,fontSize:9,color:"#555"}}>lots</div></div>)}
    </div>
    {slPips&&<div style={{...mono,fontSize:10,color:"#444",marginTop:7,textAlign:"center"}}>SL = {slPips} pips · {pair}</div>}
  </div>;
}

function ForexNews(){
  const[events,setEvents]=useState([]);
  const[loading,setLoading]=useState(true);
  const[err,setErr]=useState(null);
  const[filter,setFilter]=useState("high");

  useEffect(()=>{
    setLoading(true);
    var FF="https://nfs.faireconomy.media/ff_calendar_thisweek.json";
    var PROXY="https://corsproxy.io/?url="+encodeURIComponent(FF);
    fetch(FF,{cache:"no-store"})
      .catch(function(){return fetch(PROXY,{cache:"no-store"});})
      .then(function(r){return r.json();})
      .then(function(data){
        var sorted=[].concat(data).sort(function(a,b){return new Date(a.date)-new Date(b.date);});
        setEvents(sorted);setLoading(false);
      })
      .catch(function(){
        setErr("Could not load news. Tap retry or check your internet connection.");
        setLoading(false);
      });
  },[]);

  const impactColor={High:"#ff4444",Medium:"#f0a500",Low:"#555",Holiday:"#333"};
  const impactBg={High:"rgba(255,68,68,.08)",Medium:"rgba(240,165,0,.05)",Low:"transparent",Holiday:"transparent"};

  const filtered=events.filter(e=>{
    if(filter==="high")return e.impact==="High";
    if(filter==="medium")return e.impact==="High"||e.impact==="Medium";
    return true;
  });

  const today=new Date();today.setHours(0,0,0,0);
  const todayStr=dKey(today);

  // Group by date
  const grouped={};
  filtered.forEach(e=>{
    const d=dKey(new Date(e.date));
    if(!grouped[d])grouped[d]=[];
    grouped[d].push(e);
  });

  return(
    <div className="fade">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,color:"white",letterSpacing:.5}}>Economic Calendar</div>
        <div style={{display:"flex",gap:5}}>
          {[["high","High Only"],["medium","Med+High"],["all","All"]].map(([v,l])=>(
            <button key={v} onClick={()=>setFilter(v)} style={{...BS,padding:"6px 10px",fontSize:9,background:filter===v?"#1a1a1a":"none",border:`1px solid ${filter===v?"#2a2a2a":"#141414"}`,color:filter===v?"white":"#555"}}>{l}</button>
          ))}
        </div>
      </div>
      <div style={{...mono,fontSize:9,color:"#444",marginBottom:12,letterSpacing:1}}>Source: ForexFactory · This week · Auto-refreshed</div>

      {loading&&<div style={{textAlign:"center",padding:"40px 0",...mono,fontSize:12,color:"#333"}}>Loading live events...</div>}
      {err&&<div style={{background:"rgba(255,68,68,.05)",border:"1px solid rgba(255,68,68,.15)",borderRadius:7,padding:12,...mono,fontSize:12,color:"#ff8888",display:"flex",gap:10,alignItems:"center",justifyContent:"space-between"}}>
        <span>{err}</span>
        <button onClick={function(){setErr(null);setLoading(true);var FF="https://nfs.faireconomy.media/ff_calendar_thisweek.json";var P="https://corsproxy.io/?url="+encodeURIComponent(FF);fetch(FF,{cache:"no-store"}).catch(function(){return fetch(P,{cache:"no-store"});}).then(function(r){return r.json();}).then(function(d){setEvents([].concat(d).sort(function(a,b){return new Date(a.date)-new Date(b.date);}));setLoading(false);}).catch(function(){setErr("Still failing. Check connection.");setLoading(false);});}} style={{...BS,padding:"5px 10px",fontSize:9,background:"rgba(56,189,248,.1)",border:"1px solid rgba(56,189,248,.2)",color:"#38bdf8",flexShrink:0}}>Retry</button>
      </div>}

      {!loading&&!err&&Object.keys(grouped).sort().map(dateStr=>{
        const isToday=dateStr===todayStr;
        const d=new Date(dateStr+"T12:00:00");
        const dayLabel=d.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"short"});
        return(
          <div key={dateStr} style={{marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <div style={{...mono,fontSize:10,color:isToday?"#c8f135":"#555",letterSpacing:2,textTransform:"uppercase"}}>{isToday?"TODAY — ":""}{dayLabel}</div>
              {isToday&&<div style={{width:6,height:6,borderRadius:"50%",background:"#c8f135",animation:"pulse 1.5s infinite"}}/>}
              <div style={{flex:1,height:1,background:"#151515"}}/>
            </div>
            {grouped[dateStr].map((ev,i)=>{
              const evTime=ev.date?new Date(ev.date).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",hour12:false}):"";
              const isPast=new Date(ev.date)<new Date();
              return(
                <div key={i} style={{background:isPast?"#0a0a0a":impactBg[ev.impact]||"transparent",border:`1px solid ${ev.impact==="High"?"rgba(255,68,68,.12)":"#141414"}`,borderLeft:`3px solid ${impactColor[ev.impact]||"#333"}`,borderRadius:6,padding:"10px 12px",marginBottom:5,opacity:isPast?.5:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                    <div style={{...mono,fontSize:11,color:"#555",minWidth:42}}>{evTime}</div>
                    <div style={{...mono,fontSize:10,color:impactColor[ev.impact]||"#555",border:`1px solid ${impactColor[ev.impact]||"#333"}33`,padding:"1px 6px",borderRadius:3,letterSpacing:2}}>{ev.impact?.toUpperCase()}</div>
                    <div style={{...mono,fontSize:10,color:"#888",border:"1px solid #222",padding:"1px 6px",borderRadius:3}}>{ev.currency}</div>
                    <div style={{flex:1,fontSize:13,color:isPast?"#666":"#e0e0e0",minWidth:100}}>{ev.title}</div>
                    <div style={{display:"flex",gap:12,flexShrink:0}}>
                      {ev.forecast&&<div style={{textAlign:"right"}}><div style={{...mono,fontSize:8,color:"#444"}}>FORECAST</div><div style={{...mono,fontSize:11,color:"#888"}}>{ev.forecast}</div></div>}
                      {ev.previous&&<div style={{textAlign:"right"}}><div style={{...mono,fontSize:8,color:"#444"}}>PREV</div><div style={{...mono,fontSize:11,color:"#666"}}>{ev.previous}</div></div>}
                      {ev.actual&&<div style={{textAlign:"right"}}><div style={{...mono,fontSize:8,color:"#444"}}>ACTUAL</div><div style={{...mono,fontSize:11,color:parseFloat(ev.actual)>parseFloat(ev.forecast)?"#34d399":"#ff4444"}}>{ev.actual}</div></div>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}
      {!loading&&!err&&filtered.length===0&&<div style={{textAlign:"center",padding:"30px 0",...mono,fontSize:12,color:"#333"}}>No {filter==="high"?"high":filter==="medium"?"medium/high":""} impact events this week</div>}
      <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}`}</style>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// CALENDAR (reusable, accepts filtered trades)
// ═══════════════════════════════════════════════════════════
function CalendarView({trades,title}){
  const n=new Date();
  const[year,setYear]=useState(n.getFullYear());
  const[month,setMonth]=useState(n.getMonth());
  const[selected,setSelected]=useState(null);
  const MN=["January","February","March","April","May","June","July","August","September","October","November","December"];

  const dayMap=useMemo(()=>{
    const map={};
    trades.forEach(t=>{
      const ed=parseDate(t.timestamp);if(!ed)return;
      const isRunning=!t.outcome||t.outcome.includes("Running");
      let exitDate=null;
      if(t.exitTimestamp){exitDate=new Date(t.exitTimestamp);if(isNaN(exitDate))exitDate=null;}
      const eKey=dKey(ed);
      if(!map[eKey])map[eKey]=[];map[eKey].push({type:"entry",trade:t});
      if(!isRunning&&exitDate){
        let cur=addDays(ed,1);
        while(dKey(cur)!==dKey(exitDate)&&Math.floor((cur-ed)/86400000)<90){const k=dKey(cur);if(!map[k])map[k]=[];map[k].push({type:"running",trade:t});cur=addDays(cur,1);}
        const xk=dKey(exitDate);if(!map[xk])map[xk]=[];map[xk].push({type:"exit",trade:t});
      } else if(isRunning){
        let cur=addDays(ed,1);const today=new Date();today.setHours(0,0,0,0);
        while(cur<=today&&Math.floor((cur-ed)/86400000)<90){const k=dKey(cur);if(!map[k])map[k]=[];map[k].push({type:"running",trade:t});cur=addDays(cur,1);}
      }
    });
    return map;
  },[trades]);

  const firstDay=new Date(year,month,1),lastDay=new Date(year,month+1,0);
  const startDow=(firstDay.getDay()+6)%7;
  const days=[];
  for(let i=0;i<startDow;i++)days.push(null);
  for(let d=1;d<=lastDay.getDate();d++)days.push(new Date(year,month,d));

  const dayCol=evts=>{
    if(!evts?.length)return null;
    const exits=evts.filter(e=>e.type==="exit");
    if(exits.length){const w=exits.some(e=>e.trade.outcome?.includes("Win")||parseFloat(e.trade.actualPct)>0),l=exits.some(e=>e.trade.outcome?.includes("Loss")||parseFloat(e.trade.actualPct)<0);if(w&&!l)return"#34d399";if(l&&!w)return"#ff4444";return"#f0a500";}
    if(evts.some(e=>e.type==="entry"))return"#c8f135";
    if(evts.some(e=>e.type==="running")){const t=evts.find(e=>e.type==="running").trade;return t.direction==="BUY"?"rgba(52,211,153,.35)":"rgba(255,68,68,.35)";}
    return null;
  };

  const mT=trades.filter(t=>{const d=parseDate(t.timestamp);return d&&d.getFullYear()===year&&d.getMonth()===month;});
  const mCl=mT.filter(t=>t.outcome&&!t.outcome.includes("Running"));
  const mW=mCl.filter(t=>t.outcome?.includes("Win")).length;
  const mNet=mCl.reduce((s,t)=>s+(parseFloat(t.actualPct)||0),0);

  const dlCSV=()=>{
    const rows=[["Date","Pair","Dir","Entry","SL","TP","Lots","Risk%","Outcome","PnL%","Exit Reason"]];
    mT.forEach(t=>rows.push([t.timestamp||"",t.pair||"",t.direction||"",t.entry||"",t.sl||"",t.tp||"",t.lots||"",t.riskPct||"",t.outcome||"",t.actualPct||"",t.exitWhy||""]));
    const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download=`NBS_${MN[month]}_${year}${title?"_"+title.replace(/\s/g,"_"):"" }.csv`;a.click();
  };

  const selKey=selected?dKey(selected):null,selEvts=selKey?(dayMap[selKey]||[]):[];

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          <button onClick={()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);}} style={{...BS,padding:"6px 11px",background:"#111",border:"1px solid #1e1e1e",color:"#888"}}>‹</button>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:"white",letterSpacing:1,minWidth:190,textAlign:"center"}}>{MN[month]} {year}</div>
          <button onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);}} style={{...BS,padding:"6px 11px",background:"#111",border:"1px solid #1e1e1e",color:"#888"}}>›</button>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{background:"#0d0d0d",border:"1px solid #191919",borderRadius:7,padding:"7px 12px",display:"flex",gap:12}}>
            <div style={{textAlign:"center"}}><div style={{...mono,fontSize:15,fontWeight:"bold",color:mNet>=0?"#34d399":"#ff4444"}}>{mNet>=0?"+":""}{mNet.toFixed(1)}%</div><div style={{...mono,fontSize:9,color:"#444"}}>Monthly</div></div>
            <div style={{textAlign:"center"}}><div style={{...mono,fontSize:15,fontWeight:"bold",color:"#e0e0e0"}}>{mW}/{mCl.length}</div><div style={{...mono,fontSize:9,color:"#444"}}>W/Total</div></div>
            <div style={{textAlign:"center"}}><div style={{...mono,fontSize:15,fontWeight:"bold",color:"#c8f135"}}>{mT.length}</div><div style={{...mono,fontSize:9,color:"#444"}}>Trades</div></div>
          </div>
          <button onClick={dlCSV} style={{...BS,background:"rgba(200,241,53,.08)",border:"1px solid rgba(200,241,53,.18)",color:"#c8f135",padding:"8px 12px"}}>↓ CSV</button>
        </div>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
        {[["Entry","#c8f135"],["Running Buy","rgba(52,211,153,.5)"],["Running Sell","rgba(255,68,68,.5)"],["Win Exit","#34d399"],["Loss Exit","#ff4444"]].map(([l,c])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:2,background:c}}/><span style={{...mono,fontSize:9,color:"#555"}}>{l}</span></div>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:2}}>
        {["M","T","W","T","F","S","S"].map((d,i)=><div key={i} style={{...mono,fontSize:9,color:"#444",textAlign:"center",padding:"3px 0",letterSpacing:1}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {days.map((day,i)=>{
          if(!day)return<div key={"e"+i}/>;
          const key=dKey(day),evts=dayMap[key]||[],col=dayCol(evts),isSel=selKey===key,isToday=dKey(new Date())===key;
          const entryEvts=evts.filter(e=>e.type==="entry"),exitEvts=evts.filter(e=>e.type==="exit");
          return(
            <div key={key} onClick={()=>setSelected(isSel?null:day)} style={{minHeight:54,borderRadius:5,background:col?"rgba(0,0,0,.22)":"#0a0a0a",border:`1px solid ${isSel?"#c8f135":(isToday?"#2a2a2a":(col?col+"55":"#111"))}`,cursor:evts.length?"pointer":"default",position:"relative",overflow:"hidden",padding:"2px 3px",transition:"all .12s"}}>
              {col&&<div style={{position:"absolute",top:0,left:0,right:0,height:2,background:col,opacity:.9}}/>}
              <div style={{marginTop:col?3:0,display:"flex",flexDirection:"column",gap:1}}>
                <div style={{...mono,fontSize:10,color:isToday?"#c8f135":col?"#ddd":"#444",fontWeight:isToday?"bold":"normal"}}>{day.getDate()}</div>
                {entryEvts.slice(0,2).map((ev,j)=><div key={j} style={{background:"rgba(200,241,53,.12)",borderRadius:2,padding:"0 2px"}}><div style={{...mono,fontSize:8,color:"#c8f135",lineHeight:1.3}}>{ev.trade.pair}</div></div>)}
                {exitEvts.slice(0,1).map((ev,j)=><div key={j} style={{background:ev.trade.outcome?.includes("Win")?"rgba(52,211,153,.15)":"rgba(255,68,68,.15)",borderRadius:2,padding:"0 2px"}}><div style={{...mono,fontSize:8,color:ev.trade.outcome?.includes("Win")?"#34d399":"#ff4444"}}>{ev.trade.actualPct?(parseFloat(ev.trade.actualPct)>=0?"+":"")+ev.trade.actualPct+"%":"exit"}</div></div>)}
              </div>
            </div>
          );
        })}
      </div>

      {selected&&selEvts.length>0&&(
        <div style={{marginTop:10,background:"#0d0d0d",border:"1px solid #1a1a1a",borderRadius:9,padding:13}}>
          <div style={{...mono,fontSize:10,color:"#555",letterSpacing:2,textTransform:"uppercase",marginBottom:9}}>{selected.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div>
          {selEvts.map((ev,i)=>{
            const t=ev.trade;
            return<div key={i} style={{background:"#111",border:"1px solid #1a1a1a",borderRadius:7,padding:10,marginBottom:5,borderLeft:`3px solid ${ev.type==="entry"?"#c8f135":ev.type==="exit"?(t.outcome?.includes("Win")?"#34d399":"#ff4444"):"#333"}`}}>
              <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap",marginBottom:ev.type!=="running"?5:0}}>
                <span style={{...mono,fontWeight:"bold",color:"white",fontSize:13}}>{t.pair}</span>
                <Pill label={ev.type.toUpperCase()} col={ev.type==="entry"?"lime":ev.type==="exit"?(t.outcome?.includes("Win")?"green":"red"):"zinc"} sm/>
                {ev.type==="entry"&&<span style={{...mono,fontSize:10,color:"#666"}}>{t.timestamp}</span>}
                {ev.type==="exit"&&t.actualPct&&<span style={{...mono,fontSize:12,color:parseFloat(t.actualPct)>=0?"#34d399":"#ff4444"}}>{parseFloat(t.actualPct)>=0?"+":""}{t.actualPct}%</span>}
              </div>
              {ev.type==="entry"&&<div style={{display:"flex",gap:10,flexWrap:"wrap"}}>{[["Dir",t.direction],["E",t.entry],["SL",t.sl],["TP",t.tp],["Lots",t.lots]].map(([k,v])=>v?<div key={k}><span style={{...mono,fontSize:9,color:"#444"}}>{k} </span><span style={{...mono,fontSize:11,color:"#bbb"}}>{v}</span></div>:null)}</div>}
              {ev.type==="running"&&<div style={{...mono,fontSize:10,color:"#555"}}>Open · E:{t.entry} · SL:{t.sl}</div>}
            </div>;
          })}
        </div>
      )}
    </div>
  );
}

// FIRM DETAIL PAGE (with own calendar tab)

  const firmTrades=trades.filter(t=>(t.firmIds||[]).includes(firm.id));

  const phC={Challenge:"#c8f135",Verification:"#38bdf8",Funded:"#34d399",Passed:"#a78bfa",Failed:"#ff4444",Live:"#34d399"};

  const saveEdit=()=>{onUpdate(firm.id,{...ef,accountSize:parseFloat(ef.accountSize),profitTarget:parseFloat(ef.profitTarget)||0,maxDaily:parseFloat(ef.maxDaily)||0,maxDrawdown:parseFloat(ef.maxDrawdown)||0});setEditMode(false);};

    const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download=`NBS_${firm.name.replace(/\s/g,"_")}_All.csv`;a.click();
  };

  return(
    <div className="fade">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:7}}>
        <button onClick={onBack} style={{...BS,background:"none",border:"1px solid #222",color:"#666",padding:"7px 12px"}}>← Back</button>
        <div style={{display:"flex",gap:6}}>
          <button onClick={dlCSV} style={{...BS,background:"rgba(200,241,53,.07)",border:"1px solid rgba(200,241,53,.17)",color:"#c8f135",padding:"7px 11px"}}>↓ CSV</button>
          <button onClick={()=>exportWordDoc(trades,firms,firm.id,firm.name)} style={{...BS,background:"none",border:"1px solid #1e1e1e",color:"#555",padding:"7px 11px"}}>↓ Word</button>
          <button onClick={()=>setEditMode(!editMode)} style={{...BS,background:editMode?"rgba(56,189,248,.1)":"#111",border:`1px solid ${editMode?"rgba(56,189,248,.25)":"#222"}`,color:editMode?"#38bdf8":"#666",padding:"7px 11px"}}>{editMode?"✕":"✎ Edit"}</button>
          {!firm.isPersonal&&<button onClick={()=>setConfirmDel(true)} style={{...BS,background:"rgba(255,68,68,.07)",border:"1px solid rgba(255,68,68,.17)",color:"#ff6666",padding:"7px 11px"}}>✕ Delete</button>}
        </div>
      </div>

      {confirmDel&&(
        <div style={{background:"rgba(255,68,68,.05)",border:"1px solid rgba(255,68,68,.2)",borderRadius:8,padding:14,marginBottom:12}}>
          <div style={{...mono,fontSize:12,color:"#ff8888",marginBottom:9}}>Delete "{firm.name}"? Cannot be undone.</div>
          <div style={{display:"flex",gap:7}}><button onClick={()=>{onDelete(firm.id);}} style={{...BS,background:"rgba(255,68,68,.14)",border:"1px solid rgba(255,68,68,.3)",color:"#ff4444",padding:"8px 13px"}}>Yes, Delete</button><button onClick={()=>setConfirmDel(false)} style={{...BS,background:"none",border:"1px solid #333",color:"#666",padding:"8px 13px"}}>Cancel</button></div>
        </div>
      )}

      {editMode&&(
        <div style={{background:"#0f0f0f",border:"1px solid #222",borderRadius:9,padding:15,marginBottom:14,display:"flex",flexDirection:"column",gap:9}}>
          <div style={{...mono,fontSize:9,color:"#38bdf8",letterSpacing:3,textTransform:"uppercase"}}>Edit Account</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
            <I label="Name" value={ef.name} onChange={e=>setEf(p=>({...p,name:e.target.value}))}/>
            <I label="Account Size ($)" value={ef.accountSize} onChange={e=>setEf(p=>({...p,accountSize:e.target.value}))}/>
            {!firm.isPersonal&&<><I label="Profit Target (%)" value={ef.profitTarget} onChange={e=>setEf(p=>({...p,profitTarget:e.target.value}))}/><I label="Max Daily Loss (%)" value={ef.maxDaily} onChange={e=>setEf(p=>({...p,maxDaily:e.target.value}))}/><I label="Max Drawdown (%)" value={ef.maxDrawdown} onChange={e=>setEf(p=>({...p,maxDrawdown:e.target.value}))}/></>}
            <Se label="Phase" value={ef.phase} onChange={v=>setEf(p=>({...p,phase:v}))} options={PHASES}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}><div style={LB}>Color</div><input type="color" value={ef.color} onChange={e=>setEf(p=>({...p,color:e.target.value}))} style={{width:44,height:32,borderRadius:6,background:"none"}}/></div>
          <button onClick={saveEdit} style={{...BS,background:"rgba(200,241,53,.09)",border:"1px solid rgba(200,241,53,.2)",color:"#c8f135",padding:"11px"}}>Save Changes</button>
        </div>
      )}

      {/* Header card */}
      <div style={{background:"#0d0d0d",border:`1px solid ${firm.color}22`,borderTop:`3px solid ${firm.color}`,borderRadius:9,padding:16,marginBottom:12}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10,flexWrap:"wrap",marginBottom:12}}>
          <div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:"white",letterSpacing:.5}}>{firm.name}</div>
            <div style={{display:"flex",gap:6,marginTop:3,flexWrap:"wrap"}}>
              {firm.isPersonal&&<Pill label="Personal" col="lime" sm/>}
              <span style={{...mono,fontSize:9,color:ph,border:`1px solid ${ph}44`,padding:"1px 7px",borderRadius:3,letterSpacing:2}}>{firm.phase?.toUpperCase()}</span>
              <span style={{...mono,fontSize:10,color:"#555"}}>${Number(firm.accountSize).toLocaleString()}</span>
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{...mono,fontSize:24,fontWeight:"bold",color:s.np>=0?"#34d399":"#ff4444"}}>{fmtC(s.np)}</div>
            <div style={{...mono,fontSize:10,color:"#555"}}>{fmtP(s.np/firm.accountSize*100)} net</div>
          </div>
        </div>
        <div style={{background:"#090909",borderRadius:8,padding:"9px 9px 4px",marginBottom:firm.profitTarget>0?12:0}}>
          <div style={{...mono,fontSize:9,color:"#444",letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>Equity Curve</div>
          <EquityCurve equity={s.equity}/>
          <div style={{display:"flex",justifyContent:"space-between",...mono,fontSize:10,color:"#444",marginTop:4,padding:"0 2px"}}><span>Start: ${Number(firm.accountSize).toLocaleString()}</span><span style={{color:s.bal>=firm.accountSize?"#34d399":"#ff4444"}}>Now: ${s.bal.toLocaleString(undefined,{maximumFractionDigits:0})}</span></div>
        </div>
        {!firm.isPersonal&&firm.profitTarget>0&&(
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {[["Profit Progress",fmtP(s.np/firm.accountSize*100)+" / "+firm.profitTarget+"%",Math.min(100,Math.max(0,s.np/firm.accountSize*100/firm.profitTarget*100)),"#c8f135"],s.np<0?["Drawdown Used",fmtP(Math.abs(s.np)/firm.accountSize*100)+" / "+firm.maxDrawdown+"%",Math.min(100,Math.abs(s.np)/firm.accountSize*100/firm.maxDrawdown*100),"#ff4444"]:null].filter(Boolean).map(([l,v,pct,c])=>(
              <div key={l}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><div style={{...mono,fontSize:9,color:"#555",letterSpacing:2,textTransform:"uppercase"}}>{l}</div><div style={{...mono,fontSize:10,color:c}}>{v}</div></div>
                <div style={{height:4,background:"#1a1a1a",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:c,borderRadius:2}}/></div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:14}}>
        {[["stats","Stats"],["calendar","Calendar"],["trades","Trades ("+firmTrades.length+")"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{...BS,padding:"7px 13px",fontSize:9,background:tab===id?"#171717":"none",border:`1px solid ${tab===id?"#252525":"#131313"}`,color:tab===id?"white":"#555"}}>{label}</button>
        ))}
      </div>

      {/* Stats tab */}
      {tab==="stats"&&(
        <div className="fade">
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
            <StatTile label="Current Balance" value={`$${s.bal.toLocaleString(undefined,{maximumFractionDigits:0})}`} col="#e0e0e0"/>
            <StatTile label="HWM" value={`$${s.hwm.toLocaleString(undefined,{maximumFractionDigits:0})}`} sub={s.hwmDate||""} col="#c8f135"/>
            <StatTile label="PnL from HWM" value={fmtC(s.pnlHwm)} col={s.pnlHwm>=0?"#34d399":"#ff4444"}/>
            <StatTile label="Net Profit" value={fmtC(s.np)} sub={fmtP(s.np/firm.accountSize*100)} col={s.np>=0?"#34d399":"#ff4444"}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:8}}>
            <StatTile label="Gross Profit" value={fmtC(s.gp)} col="#34d399"/>
            <StatTile label="Gross Loss" value={fmtC(-s.gl)} col="#ff4444"/>
            <StatTile label="Profit Factor" value={s.pf>=99?"∞":s.pf.toFixed(2)} col={s.pf>=1.5?"#34d399":s.pf>=1?"#f0a500":"#ff4444"}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
            <StatTile label="Best Trade" value={fmtC(s.best)} col="#34d399"/>
            <StatTile label="Biggest Loss" value={fmtC(s.worst)} col="#ff4444"/>
            <StatTile label="Expectancy" value={fmtC(s.exp)} sub="per trade" col={s.exp>=0?"#c8f135":"#ff4444"}/>
            <StatTile label="Avg Trade Size" value={s.avgSz?s.avgSz.toFixed(2)+" lots":"–"} col="#38bdf8"/>
            <StatTile label="Avg Duration" value={s.avgDur?Math.round(s.avgDur)+"h":"–"} col="#888"/>
            <StatTile label="Avg Duration (days)" value={s.avgDur?( s.avgDur/24).toFixed(1)+"d":"–"} col="#888"/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:10}}>
            <StatTile label="Total Trades" value={s.tot} col="#e0e0e0"/>
            <StatTile label="Win Rate" value={s.tot?s.winRate+"%":"–"} col={s.winRate>=50?"#34d399":s.winRate>=40?"#f0a500":"#ff4444"}/>
            <StatTile label="Wins" value={s.wins} col="#34d399"/>
            <StatTile label="Losses" value={s.losses} col="#ff4444"/>
          </div>
          {/* Direction Analysis */}
          <div style={{background:"#0d0d0d",border:"1px solid #161616",borderRadius:8,padding:13,marginBottom:10}}>
            <div style={{...mono,fontSize:9,color:"#555",letterSpacing:3,textTransform:"uppercase",marginBottom:10}}>Direction Analysis</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
              {[["LONG (BUY)",s.long,"#34d399"],["SHORT (SELL)",s.short,"#ff4444"]].map(([title,d,c])=>(
                <div key={title} style={{background:"#111",borderRadius:7,padding:11,borderTop:`2px solid ${c}44`}}>
                  <div style={{...mono,fontSize:10,color:c,letterSpacing:2,marginBottom:7}}>{title}</div>
                  {[["Total",d.total],["Wins",d.wins],["Losses",d.losses],["Win Rate",d.wr+"%"],["Profitability",fmtC(d.pnl)]].map(([k,v])=>(
                    <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{...mono,fontSize:10,color:"#555"}}>{k}</span><span style={{...mono,fontSize:11,color:k==="Profitability"?(d.pnl>=0?"#34d399":"#ff4444"):"#ccc"}}>{v}</span></div>
                  ))}
                </div>
              ))}
            </div>
          </div>
          {/* Weekly */}
          {s.weekly.length>0&&(
            <div style={{background:"#0d0d0d",border:"1px solid #161616",borderRadius:8,padding:13}}>
              <div style={{...mono,fontSize:9,color:"#555",letterSpacing:3,textTransform:"uppercase",marginBottom:10}}>Weekly Summary</div>
              {s.weekly.map(w=>(
                <div key={w.week} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:"1px solid #111"}}>
                  <div style={{...mono,fontSize:10,color:"#555",minWidth:80}}>w/{w.week}</div>
                  <div style={{...mono,fontSize:10,color:"#34d399",minWidth:28}}>{w.wins}W</div>
                  <div style={{...mono,fontSize:10,color:"#ff4444",minWidth:28}}>{w.losses}L</div>
                  <div style={{flex:1,height:3,background:"#141414",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:w.trades?`${w.wins/w.trades*100}%`:"0%",background:"#34d399",borderRadius:2}}/></div>
                  <div style={{...mono,fontSize:11,color:w.pnl>=0?"#34d399":"#ff4444",minWidth:60,textAlign:"right"}}>{fmtC(w.pnl)}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {tab==="calendar"&&(
        <div className="fade"><CalendarView trades={firmTrades} title={firm.name}/></div>
      )}

      {tab==="trades"&&(
        <div className="fade">
          {firmTrades.length===0?<div style={{textAlign:"center",padding:"24px",...mono,fontSize:12,color:"#2a2a2a"}}>No trades assigned to this account yet.</div>
          :firmTrades.sort((a,b)=>(parseDate(b.timestamp)||0)-(parseDate(a.timestamp)||0)).map(t=>{
            const pnl=tradePnlDollar(t,firm.accountSize);
            return<div key={t.id} style={{background:"#0f0f0f",border:"1px solid #171717",borderRadius:7,padding:"10px 13px",marginBottom:5,display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
              <span style={{...mono,fontWeight:"bold",color:"white",fontSize:13}}>{t.pair}</span>
              <Pill label={t.direction} col={t.direction==="BUY"?"green":"red"} sm/>
              {t.outcome&&<Pill label={t.outcome.split("—")[0].trim()} col={t.outcome.includes("Win")?"green":t.outcome.includes("Loss")?"red":t.outcome.includes("Breakeven")?"amber":"sky"} sm/>}
              {pnl!=null&&<span style={{...mono,fontSize:12,color:pnl>=0?"#34d399":"#ff4444"}}>{fmtC(pnl)}</span>}
              {t.actualPct&&<span style={{...mono,fontSize:11,color:parseFloat(t.actualPct)>=0?"#34d399":"#ff4444"}}>{parseFloat(t.actualPct)>=0?"+":""}{t.actualPct}%</span>}
              <span style={{...mono,fontSize:9,color:"#333",marginLeft:"auto"}}>{t.timestamp?.substring(0,9)}</span>
            </div>;
          })}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// WORD DOC EXPORT
// ═══════════════════════════════════════════════════════════
function exportWordDoc(trades, firms, filterFirmId=null, filterLabel="All Accounts"){
  const MN=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const getWkLabel=d=>{const t=new Date(d);t.setHours(0,0,0,0);const day=t.getDay()||7;t.setDate(t.getDate()+1-day);const e=new Date(t);e.setDate(e.getDate()+6);return`Week ${t.getDate()} ${MN[t.getMonth()].substring(0,3)} – ${e.getDate()} ${MN[e.getMonth()].substring(0,3)} ${e.getFullYear()}`;};

  // Filter trades
  let tList=filterFirmId?trades.filter(t=>(t.firmIds||[]).includes(filterFirmId)):trades;
  tList=[...tList].sort((a,b)=>(parseDate(a.timestamp)||0)-(parseDate(b.timestamp)||0));

  // Group by month then week
  const months={};
  tList.forEach(t=>{
    const d=parseDate(t.timestamp);if(!d)return;
    const mKey=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    const mLabel=`${MN[d.getMonth()]} ${d.getFullYear()}`;
    const wKey=getWkLabel(d);
    if(!months[mKey])months[mKey]={label:mLabel,weeks:{}};
    if(!months[mKey].weeks[wKey])months[mKey].weeks[wKey]=[];
    months[mKey].weeks[wKey].push(t);
  });

  const fmtRow=(label,value)=>`<tr><td style="padding:4px 8px;color:#666;font-size:11pt;width:160px;border:1px solid #ddd">${label}</td><td style="padding:4px 8px;font-size:11pt;border:1px solid #ddd"><b>${value||'–'}</b></td></tr>`;
  const fmtPnl=pct=>{const p=parseFloat(pct);if(isNaN(p))return'–';return`<span style="color:${p>=0?'#1a7a4a':'#cc2200'}">${p>=0?'+':''}${p}%</span>`;};

  let body=`
    <h1 style="font-family:Arial;color:#1a1a1a;border-bottom:3px solid #c8f135;padding-bottom:8px">NBS Trading Journal</h1>
    <p style="font-family:Arial;color:#666;font-size:11pt">Account: <b>${filterLabel}</b> &nbsp;|&nbsp; Generated: ${new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})} &nbsp;|&nbsp; Total Trades: <b>${tList.length}</b></p>
    <br/>
  `;

  Object.keys(months).sort().forEach(mKey=>{
    const m=months[mKey];
    const mTrades=Object.values(m.weeks).flat();
    const mClosed=mTrades.filter(t=>t.actualPct!=null&&t.actualPct!=="");
    const mNet=mClosed.reduce((s,t)=>s+(parseFloat(t.actualPct)||0),0);
    const mWins=mClosed.filter(t=>parseFloat(t.actualPct)>0).length;

    body+=`<h2 style="font-family:Arial;color:#1a1a1a;background:#f5f5f5;padding:8px 12px;margin-top:24px">${m.label} &nbsp; <span style="font-size:13pt;color:${mNet>=0?'#1a7a4a':'#cc2200'}">${mNet>=0?'+':''}${mNet.toFixed(2)}%</span> &nbsp; <span style="font-size:11pt;color:#888">${mWins}W / ${mClosed.length-mWins}L out of ${mTrades.length} trades</span></h2>`;

    Object.keys(m.weeks).sort().forEach(wKey=>{
      const wTrades=m.weeks[wKey];
      const wClosed=wTrades.filter(t=>t.actualPct!=null&&t.actualPct!=="");
      const wNet=wClosed.reduce((s,t)=>s+(parseFloat(t.actualPct)||0),0);

      body+=`<h3 style="font-family:Arial;color:#444;padding:6px 12px;border-left:4px solid #c8f135;margin-top:18px">${wKey} &nbsp; <span style="font-size:11pt;color:${wNet>=0?'#1a7a4a':'#cc2200'}">${wNet>=0?'+':''}${wNet.toFixed(2)}%</span></h3>`;

      wTrades.forEach((t,i)=>{
        const firmNames=(t.firmIds||[]).map(id=>firms.find(f=>f.id===id)?.name).filter(Boolean).join(', ');
        const outcome=t.outcome||'Open';
        const outColor=outcome.includes('Win')?'#1a7a4a':outcome.includes('Loss')?'#cc2200':'#884400';
        body+=`
          <div style="margin:10px 0 16px;border:1px solid #ddd;border-radius:4px;overflow:hidden">
            <div style="background:#1a1a1a;color:white;padding:8px 12px;font-family:Arial">
              <b style="font-size:13pt">${t.pair}</b> &nbsp;
              <span style="background:${t.direction==='BUY'?'#1a7a4a':'#cc2200'};color:white;padding:1px 8px;border-radius:3px;font-size:10pt">${t.direction}</span>
              &nbsp; <span style="color:#aaa;font-size:10pt">${t.timestamp||''}</span>
              &nbsp; <span style="color:${outColor};font-size:10pt;float:right">${outcome}</span>
            </div>
            <table style="width:100%;border-collapse:collapse">
              ${fmtRow('Account(s)',firmNames||'–')}
              ${fmtRow('Entry / SL / TP',`${t.entry||'–'} / ${t.sl||'–'} / ${t.tp||'–'}`)}
              ${fmtRow('Lots / Risk',`${t.lots||'–'} lots &nbsp;|&nbsp; ${t.riskPct||'1'}% risk`)}
              ${fmtRow('R:R',t.rr?t.rr+'R':'–')}
              ${fmtRow('Actual P&L',fmtPnl(t.actualPct))}
              ${t.exitPrice?fmtRow('Exit Price',t.exitPrice):''}
              ${t.exitWhy?fmtRow('Exit Reason',t.exitWhy):''}
              ${t.marketRegime?fmtRow('Market Regime',t.marketRegime):''}
              ${t.session?fmtRow('Session',t.session):''}
              ${t.beforeNotes?fmtRow('Pre-trade Notes',t.beforeNotes.replace(/\n/g,'<br>')):''}
              ${t.afterNotes?fmtRow('Post-trade Notes',t.afterNotes.replace(/\n/g,'<br>')):''}
            </table>
          </div>`;
      });
    });
  });

  if(tList.length===0) body+='<p style="font-family:Arial;color:#999;text-align:center;padding:40px">No trades to export.</p>';

  const html=`<!DOCTYPE html><html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"><meta name="ProgId" content="Word.Document"><meta name="Generator" content="Microsoft Word 15"><style>body{font-family:Arial,sans-serif;font-size:11pt;line-height:1.5;max-width:720px;margin:0 auto}h1,h2,h3{page-break-after:avoid}</style></head><body>${body}</body></html>`;
  const blob=new Blob(['\ufeff',html],{type:'application/msword'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`NBS_Journal_${filterLabel.replace(/\s/g,'_')}_${new Date().toISOString().substring(0,10)}.doc`;a.click();
}

// ═══════════════════════════════════════════════════════════
// FIRMS LIST
// ═══════════════════════════════════════════════════════════
function FirmsPage({firms,trades,onUpdate,onDelete,onAdd,onReorder}){
  const[view,setView]=useState("list");
  const[selId,setSelId]=useState(null);
  const[phaseTab,setPhaseTab]=useState("All");
  const[dragIdx,setDragIdx]=useState(null);
  const[dragOver,setDragOver]=useState(null);
  const[af,setAf]=useState({name:"",color:"#3b82f6",accountSize:"100000",profitTarget:"10",maxDaily:"5",maxDrawdown:"10",phase:"Challenge",isPersonal:false});

  if(view==="detail"&&selId){
    const firm=firms.find(f=>f.id===selId);
    if(firm)return<FirmDetail firm={firm} trades={trades} onBack={()=>setView("list")} onUpdate={(id,d)=>{onUpdate(id,d);}} onDelete={(id)=>{onDelete(id);setView("list");}}/>;
  }
  if(view==="add")return(
    <div className="fade">
      <button onClick={()=>setView("list")} style={{...BS,background:"none",border:"1px solid #222",color:"#555",marginBottom:16,padding:"7px 12px"}}>← Back</button>
      <SH n="+" t="Add Account / Firm" col="lime"/>
      <div style={{display:"flex",flexDirection:"column",gap:9,maxWidth:460}}>
        <div style={{display:"flex",gap:7}}>
          {[["Personal",true],["Prop Firm",false]].map(([l,v])=>(
            <button key={l} onClick={()=>setAf(p=>({...p,isPersonal:v}))} style={{flex:1,padding:"9px 0",border:`1px solid ${af.isPersonal===v?"rgba(200,241,53,.4)":"#1e1e1e"}`,background:af.isPersonal===v?"rgba(200,241,53,.09)":"#111",color:af.isPersonal===v?"#c8f135":"#555",borderRadius:6,cursor:"pointer",...mono,fontSize:11,letterSpacing:2,textTransform:"uppercase"}}>{l}</button>
          ))}
        </div>
        <I label="Account Name" value={af.name} onChange={e=>setAf(p=>({...p,name:e.target.value}))} placeholder={af.isPersonal?"My Personal Account":"e.g. FTMO #2"}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
          <I label="Account Size ($)" value={af.accountSize} onChange={e=>setAf(p=>({...p,accountSize:e.target.value}))}/>
          <Se label="Phase" value={af.phase} onChange={v=>setAf(p=>({...p,phase:v}))} options={PHASES}/>
          {!af.isPersonal&&<><I label="Profit Target (%)" value={af.profitTarget} onChange={e=>setAf(p=>({...p,profitTarget:e.target.value}))}/><I label="Max Daily Loss (%)" value={af.maxDaily} onChange={e=>setAf(p=>({...p,maxDaily:e.target.value}))}/><I label="Max Drawdown (%)" value={af.maxDrawdown} onChange={e=>setAf(p=>({...p,maxDrawdown:e.target.value}))}/></>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}><div style={LB}>Color</div><input type="color" value={af.color} onChange={e=>setAf(p=>({...p,color:e.target.value}))} style={{width:44,height:32,borderRadius:6,background:"none"}}/></div>
        <button onClick={()=>{if(!af.name)return;onAdd({...af,accountSize:parseFloat(af.accountSize),profitTarget:parseFloat(af.profitTarget)||0,maxDaily:parseFloat(af.maxDaily)||0,maxDrawdown:parseFloat(af.maxDrawdown)||0,id:Date.now()});setView("list");}} style={{...BS,background:"rgba(200,241,53,.09)",border:"1px solid rgba(200,241,53,.2)",color:"#c8f135",padding:"12px"}}>Add Account</button>
      </div>
    </div>
  );

  const phaseOrder=["All","Personal","Challenge","Verification","Funded","Passed","Failed","Live"];
  const phaseColors={Personal:"#c8f135",Challenge:"#c8f135",Verification:"#38bdf8",Funded:"#34d399",Passed:"#a78bfa",Failed:"#ff4444",Live:"#34d399",All:"#888"};
  const filteredFirms=firms.filter(f=>{
    if(phaseTab==="All")return true;
    if(phaseTab==="Personal")return f.isPersonal;
    return!f.isPersonal&&f.phase===phaseTab;
  });

  return(
    <div className="fade">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:7}}>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:"white",letterSpacing:.5}}>Trading Accounts</div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>exportWordDoc(trades,firms,null,"All Accounts")} style={{...BS,background:"none",border:"1px solid #1e1e1e",color:"#555",padding:"7px 11px"}}>↓ Word Doc</button>
          <button onClick={()=>setView("add")} style={{...BS,background:"rgba(200,241,53,.07)",border:"1px solid rgba(200,241,53,.17)",color:"#c8f135",padding:"8px 13px"}}>+ Add Account</button>
        </div>
      </div>
      <div style={{display:"flex",gap:4,marginBottom:14,overflowX:"auto",paddingBottom:2}}>
        {phaseOrder.filter(ph=>{
          if(ph==="All")return true;
          if(ph==="Personal")return firms.some(f=>f.isPersonal);
          return firms.some(f=>!f.isPersonal&&f.phase===ph);
        }).map(ph=>{
          const count=ph==="All"?firms.length:ph==="Personal"?firms.filter(f=>f.isPersonal).length:firms.filter(f=>!f.isPersonal&&f.phase===ph).length;
          const isActive=phaseTab===ph;const c=phaseColors[ph]||"#888";
          return<button key={ph} onClick={()=>setPhaseTab(ph)} style={{...BS,padding:"6px 11px",fontSize:9,flexShrink:0,background:isActive?c+"18":"none",border:"1px solid "+(isActive?c+"55":"#1a1a1a"),color:isActive?c:"#555",transition:"all .15s"}}>{ph} <span style={{opacity:.6}}>({count})</span></button>;
        })}
      </div>
      {filteredFirms.length===0&&<div style={{textAlign:"center",padding:"30px 0",...mono,fontSize:12,color:"#2a2a2a"}}>No accounts in this category</div>}
      {filteredFirms.map(f=>{
        const ft=trades.filter(t=>(t.firmIds||[]).includes(f.id));
        const cl=ft.filter(t=>t.outcome&&!t.outcome.includes("Running")&&t.actualPct!=null&&t.actualPct!=="");
        const net=cl.reduce((s,t)=>s+(tradePnlDollar(t,f.accountSize)||0),0);
        const pct=f.accountSize?net/f.accountSize*100:0;
        const phC={Challenge:"#c8f135",Verification:"#38bdf8",Funded:"#34d399",Passed:"#a78bfa",Failed:"#ff4444",Live:"#34d399"};
        return(
          <div key={f.id} style={{background:"#0d0d0d",border:"1px solid "+f.color+"1a",borderLeft:"3px solid "+f.color,borderRadius:9,padding:"12px 14px",marginBottom:7,display:"flex",alignItems:"center",gap:9,flexWrap:"wrap",cursor:"pointer",transition:"background .12s"}} onClick={()=>{setSelId(f.id);setView("detail");}} draggable onDragStart={()=>setDragIdx(filteredFirms.indexOf(f))} onDragOver={e=>{e.preventDefault();setDragOver(filteredFirms.indexOf(f));}} onDragEnd={()=>{if(dragIdx!==null&&dragOver!==null&&dragIdx!==dragOver){var arr=[...firms];var fi=firms.indexOf(f);var di=firms.indexOf(filteredFirms[dragIdx]);var tmp=arr[di];arr[di]=arr[fi];arr[fi]=tmp;onReorder(arr);}setDragIdx(null);setDragOver(null);}} style={{...{background:"#0d0d0d",border:"1px solid "+f.color+"1a",borderLeft:"3px solid "+f.color+(dragOver===filteredFirms.indexOf(f)?"":""),outline:dragOver===filteredFirms.indexOf(f)?"1px solid "+f.color+"44":"none",borderRadius:9,padding:"12px 14px",marginBottom:7,display:"flex",alignItems:"center",gap:9,flexWrap:"wrap",cursor:"grab",transition:"background .12s",opacity:dragIdx===filteredFirms.indexOf(f)?0.5:1}}} onMouseEnter={e=>{if(!dragIdx)e.currentTarget.style.background="#111";}} onMouseLeave={e=>e.currentTarget.style.background="#0d0d0d"}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap",marginBottom:3}}>
                <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,color:"white",letterSpacing:.3}}>{f.name}</span>
                {f.isPersonal&&<Pill label="Personal" col="lime" sm/>}
                <span style={{...mono,fontSize:9,color:phC[f.phase]||"#888",border:"1px solid "+(phC[f.phase]||"#888")+"44",padding:"1px 6px",borderRadius:3,letterSpacing:2}}>{f.phase?.toUpperCase()}</span>
                <span style={{...mono,fontSize:10,color:"#444"}}>${Number(f.accountSize).toLocaleString()}</span>
              </div>
              {f.profitTarget>0&&<div style={{height:3,background:"#1a1a1a",borderRadius:2,overflow:"hidden",maxWidth:240,marginBottom:3}}><div style={{height:"100%",width:Math.min(100,Math.max(0,pct/f.profitTarget*100))+"%",background:f.color,borderRadius:2}}/></div>}
              <div style={{...mono,fontSize:10,color:"#555"}}>{ft.length} trades · {fmtP(pct)} · {fmtC(net)}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{...mono,fontSize:18,fontWeight:"bold",color:net>=0?"#34d399":"#ff4444"}}>{fmtC(net)}</div>
            </div>
            <span style={{color:"#333",fontSize:13}}>›</span>
          </div>
        );
      })}
    </div>
  );
}

// TRADE CARD

function TradeCard({trade,onUpdate,onDelete,firms}){
  const[open,setOpen]=useState(false);
  const[editOut,setEditOut]=useState(false);
  const[uf,setUf]=useState({outcome:trade.outcome||"",exitPrice:trade.exitPrice||"",exitWhy:trade.exitWhy||"",actualPct:trade.actualPct||"",afterNotes:trade.afterNotes||"",photoAfter:trade.photoAfter||"",exitTimestamp:trade.exitTimestamp||"",xc1:trade.xc1||false,xc2:trade.xc2||false,xc3:trade.xc3||false,xc4:trade.xc4||false});

          {trade.marketRegime&&<Pill label={trade.marketRegime.split("—")[0].trim()} col={trade.marketRegime.includes("Trending")?"green":"red"} sm/>}
          {firmNames.slice(0,2).map(n=><Pill key={n} label={n} col="sky" sm/>)}
          {firmNames.length>2&&<Pill label={"+"+( firmNames.length-2)} col="zinc" sm/>}
          {trade.outcome&&<Pill label={trade.outcome.split("—")[0].trim()} col={trade.outcome.includes("Win")?"green":trade.outcome.includes("Loss")?"red":trade.outcome.includes("Breakeven")?"amber":"sky"} sm/>}
          {trade.actualPct&&<span style={{...mono,fontSize:12,color:parseFloat(trade.actualPct)>=0?"#34d399":"#ff4444"}}>{parseFloat(trade.actualPct)>=0?"+":""}{trade.actualPct}%</span>}
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{...mono,fontSize:9,color:"#3a3a3a"}}>{trade.timestamp?.substring(0,9)}</div>
          {rr&&<div style={{...mono,fontSize:10,color:rrC(rr),marginTop:1}}>{rr}R</div>}
        </div>
        <span style={{color:"#2a2a2a",fontSize:10}}>{open?"▲":"▼"}</span>
      </div>
      {open&&(
        <div style={{borderTop:"1px solid #131313",padding:13,display:"flex",flexDirection:"column",gap:11}}>

                <div style={{...LB,marginBottom:2}}>{k}</div><div style={{...mono,fontSize:12,color:"#ddd"}}>{v||"–"}</div>
              </div>
            ))}
          </div>
          {firmNames.length>0&&<div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{firmNames.map(n=><Pill key={n} label={n} col="sky" sm/>)}</div>}
          {(trade.beforeNotes||trade.photoBefore)&&<div>

            {trade.photoBefore&&<img src={trade.photoBefore} alt="" style={{width:"100%",maxHeight:190,objectFit:"contain",borderRadius:7,border:"1px solid #1e1e1e",marginBottom:7}}/>}
            {trade.beforeNotes&&<div style={{background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:6,padding:10,...mono,fontSize:12,color:"#bbb",lineHeight:1.7,whiteSpace:"pre-wrap"}}>{trade.beforeNotes}</div>}
          </div>}

              ))}
            </div>
            {trade.afterNotes&&<div style={{background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:6,padding:10,...mono,fontSize:12,color:"#bbb",lineHeight:1.7,whiteSpace:"pre-wrap"}}>{trade.afterNotes}</div>}

              <Chk label="TP hit — held full trade" checked={uf.xc1} onChange={u("xc1")}/>
              <Chk label="SL hit — did not move it" checked={uf.xc2} onChange={u("xc2")}/>
              <Chk label="Closed early — emotional" warn checked={uf.xc3} onChange={u("xc3")}/>
              <Chk label="Moved SL after entry" warn checked={uf.xc4} onChange={u("xc4")}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><Se label="Outcome" value={uf.outcome} onChange={u("outcome")} options={OUTCOMES}/><I label="Exit Price" value={uf.exitPrice} onChange={e=>setUf(p=>({...p,exitPrice:e.target.value}))} placeholder="157.461"/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><Se label="Why exited" value={uf.exitWhy} onChange={u("exitWhy")} options={EXIT_WHY}/><I label="Actual P&L %" value={uf.actualPct} onChange={e=>setUf(p=>({...p,actualPct:e.target.value}))} placeholder="+1.5 or -1"/></div>
            <I label="Exit Date (YYYY-MM-DD)" value={uf.exitTimestamp} onChange={e=>setUf(p=>({...p,exitTimestamp:e.target.value}))} placeholder="2026-03-10"/>
            <Photo label="📷 After chart" value={uf.photoAfter} onChange={u("photoAfter")}/>
            <TA label="Post-trade notes" rows={3} value={uf.afterNotes} onChange={e=>setUf(p=>({...p,afterNotes:e.target.value}))} placeholder="What happened? Rules followed? Lessons?"/>
            <div style={{display:"flex",gap:7}}>

              {editOut&&<button onClick={()=>setEditOut(false)} style={{...BS,background:"none",border:"1px solid #222",color:"#555",padding:"9px 12px"}}>Cancel</button>}
            </div>
          </div>}
          <button onClick={()=>onDelete(trade.id)} style={{...mono,fontSize:9,color:"#222",background:"none",border:"none",cursor:"pointer",letterSpacing:2,textTransform:"uppercase"}}>✕ delete</button>
        </div>
      )}
    </div>
  );
}

  const s=k=>v=>setF(p=>({...p,[k]:v}));

  const rr=calcRR(f.entry,f.sl,f.tp,f.direction);
  const score=scoreEntry(f);
  useEffect(()=>{const l=calcLots(f.pair,f.entry,f.sl,f.riskPct,f.accountSize||100000);if(l)setF(p=>({...p,lots:String(l)}));},[f.pair,f.entry,f.sl,f.riskPct,f.accountSize]);

    if(!f.pair||!f.direction||!f.entry||!f.sl){alert("Fill in pair, direction, entry and SL.");return;}

    onSave({...f,rr,id:Date.now(),timestamp:nowTs()});

        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
          <I label="Entry" value={f.entry} onChange={se("entry")} placeholder="156.749"/>
          <I label="Stop Loss" value={f.sl} onChange={se("sl")} placeholder="156.259"/>

        <Chk label="Market is TRENDING — not ranging" sub="range = skip, no exceptions" checked={f.c8} onChange={s("c8")}/>

      {/* News */}
      <div style={{borderLeft:`2px solid ${C.amber}`,paddingLeft:12,display:"flex",flexDirection:"column",gap:8}}>
        <div style={{...mono,fontSize:9,letterSpacing:3,color:C.amber,textTransform:"uppercase"}}>05 — News Protocol</div>

        {f.newsPresent==="yes"&&<><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><Se label="News Type" value={f.newsType} onChange={s("newsType")} options={NEWS_TYPES}/><Se label="Action" value={f.newsAction} onChange={s("newsAction")} options={["Close 30min before","Reduce size 50%","Skip trade","Hold — SL handles it"]}/></div><div style={{background:"rgba(240,165,0,.04)",border:"1px solid rgba(240,165,0,.12)",borderRadius:7,padding:10,...mono,fontSize:11,color:"rgba(240,165,0,.75)",lineHeight:1.7}}>⚠ NFP/FOMC/CPI: close 30min before if in profit. Loss: let SL handle. Never move SL for news.</div></>}
      </div>
      <div>
        {score<6&&<div style={{marginBottom:8,padding:10,borderRadius:7,background:"rgba(255,68,68,.05)",border:"1px solid rgba(255,68,68,.12)",...mono,fontSize:11,color:"rgba(255,68,68,.8)"}}>⚠ Score {score}/8 — {score>=5?"borderline":"DO NOT TAKE THIS TRADE"}</div>}
        <div style={{display:"flex",gap:7}}>
          <button onClick={handleSave} style={{...BS,flex:1,padding:"13px 0",fontSize:12,background:"rgba(200,241,53,.08)",border:"1px solid rgba(200,241,53,.2)",color:"#c8f135"}}>Log Trade — Auto Timestamp & Lots</button>
          <button onClick={onCancel} style={{...BS,padding:"13px 14px",background:"none",border:"1px solid #1e1e1e",color:"#555"}}>Cancel</button>
        </div>
      </div>
    </div>
  );
}
