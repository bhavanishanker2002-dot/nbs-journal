var MN={fontFamily:"'DM Mono',monospace"};
function nowTs(){return new Date().toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit",hour12:false}).replace(","," —")}
function scoreEntry(f){return[f.c1,f.c2,f.c3,f.c4,f.c5,f.c6,f.c7,f.c8].filter(Boolean).length}
function pipSz(p){return p&&p.toUpperCase().includes("JPY")?0.01:0.0001}
function pipVal(p,price){return p&&p.toUpperCase().includes("JPY")?1000/(price||150):10}
function calcLots(pair,entry,sl,riskPct,acct){
  var e=parseFloat(entry),s=parseFloat(sl),r=parseFloat(riskPct),a=parseFloat(acct);
  if(!e||!s||!r||!a||e===s)return null;
  return Math.floor((a*r/100)/(Math.abs(e-s)/pipSz(pair)*pipVal(pair,e))*100)/100;
}
function calcRR(e,sl,tp,dir){
  var ev=parseFloat(e),sv=parseFloat(sl),tv=parseFloat(tp);
  if(!ev||!sv||!tv||ev===sv)return null;
  return parseFloat(((dir==="BUY"?tv-ev:ev-tv)/Math.abs(ev-sv)).toFixed(2));
}
function rrC(r){return r>=4?"#34d399":r>=2?"#c8f135":r>=1?"#f0a500":"#ff4444"}
function parseDate(ts){if(!ts)return null;try{var d=new Date(ts.replace(" — "," "));return isNaN(d)?null:d}catch(e){return null}}
function dKey(d){if(!d)return null;var dt=d instanceof Date?d:new Date(d);if(isNaN(dt))return null;return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0")}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r}
function fmtC(n){if(n==null||isNaN(n))return"–";var s=Math.abs(n)>=1000?"$"+(Math.abs(n)/1000).toFixed(1)+"k":"$"+Math.abs(n).toFixed(0);return n<0?"-"+s:"+"+s}
function fmtP(n){return n==null||isNaN(n)?"–":(n>=0?"+":"")+n.toFixed(2)+"%"}
function getWk(d){var t=new Date(d);t.setHours(0,0,0,0);var day=t.getDay()||7;t.setDate(t.getDate()+1-day);return t.toISOString().substring(0,10)}

// ── PER-ACCOUNT RESULT ──
// trade.accountResults[firmId] = {outcome,actualPct,exitPrice,exitWhy,afterNotes,photoAfter,exitTimestamp,xc1-4}
// Shared fields: pair,entry,sl,tp,lots,riskPct,checklist,beforeNotes,photoBefore
function getAccRes(trade,firmId){
  var root={outcome:trade.outcome||"",actualPct:trade.actualPct||"",exitPrice:trade.exitPrice||"",exitWhy:trade.exitWhy||"",afterNotes:trade.afterNotes||"",photoAfter:trade.photoAfter||"",exitTimestamp:trade.exitTimestamp||"",xc1:trade.xc1||false,xc2:trade.xc2||false,xc3:trade.xc3||false,xc4:trade.xc4||false};
  if(firmId==null)return root;
  var ar=trade.accountResults||{};
  return ar[String(firmId)]?ar[String(firmId)]:root;
}
function saveOneAcc(trade,firmId,data){
  if(firmId==null)return data;
  var ar=Object.assign({},trade.accountResults||{});
  ar[String(firmId)]=data;
  return{accountResults:ar};
}
function saveAllAcc(trade,data){
  var ar=Object.assign({},trade.accountResults||{});
  (trade.firmIds||[]).forEach(function(id){ar[String(id)]=data;});
  return Object.assign({},data,{accountResults:ar});
}
function tradePnl(t,acctSize,firmId){
  var r=getAccRes(t,firmId);
  var p=parseFloat(r.actualPct);
  return isNaN(p)?null:(parseFloat(acctSize)||100000)*p/100;
}

// ── ANALYTICS ──
function calcStats(trades,acctSize,firmId){
  var getR=function(t){return getAccRes(t,firmId)};
  var closed=trades.filter(function(t){var r=getR(t);return r.outcome&&!r.outcome.includes("Running")&&r.actualPct!=null&&r.actualPct!==""});
  var winT=closed.filter(function(t){return parseFloat(getR(t).actualPct)>0});
  var losT=closed.filter(function(t){return parseFloat(getR(t).actualPct)<0});
  var tot=closed.length,wins=winT.length,losses=losT.length;
  var pnl=function(t){return tradePnl(t,acctSize,firmId)||0};
  var gp=winT.reduce(function(s,t){return s+pnl(t)},0);
  var gl=Math.abs(losT.reduce(function(s,t){return s+pnl(t)},0));
  var np=gp-gl,pf=gl>0?gp/gl:wins>0?99:0;
  var aw=wins?gp/wins:0,al=losses?gl/losses:0;
  var exp=tot?(wins/tot*aw)-(losses/tot*al):0;
  var best=closed.reduce(function(b,t){return Math.max(b,pnl(t))},-Infinity);
  var worst=closed.reduce(function(b,t){return Math.min(b,pnl(t))},Infinity);
  var sorted=[].concat(closed).sort(function(a,b){return(parseDate(a.timestamp)||0)-(parseDate(b.timestamp)||0)});
  var bal=parseFloat(acctSize)||100000,hwm=bal,hwmDate=null;
  var equity=[{bal:bal}];
  sorted.forEach(function(t){var p2=pnl(t);bal+=p2;if(bal>hwm){hwm=bal;hwmDate=t.timestamp?t.timestamp.substring(0,9):null}equity.push({bal:bal,pnl:p2,outcome:getR(t).outcome})});
  var wkMap={};
  closed.forEach(function(t){var d=parseDate(t.timestamp);if(!d)return;var wk=getWk(d);if(!wkMap[wk])wkMap[wk]={week:wk,trades:0,wins:0,losses:0,pnl:0};var p2=pnl(t);wkMap[wk].trades++;if(p2>0)wkMap[wk].wins++;else if(p2<0)wkMap[wk].losses++;wkMap[wk].pnl+=p2});
  var weekly=Object.values(wkMap).sort(function(a,b){return b.week>a.week?1:-1}).slice(-12);
  var splitSt=function(dir){var tr=closed.filter(function(t){return t.direction===dir});var w=tr.filter(function(t){return parseFloat(getR(t).actualPct)>0}).length;return{total:tr.length,wins:w,losses:tr.length-w,wr:tr.length?Math.round(w/tr.length*100):0,pnl:tr.reduce(function(s,t){return s+pnl(t)},0)}};
  return{tot:tot,wins:wins,losses:losses,winRate:tot?Math.round(wins/tot*100):0,gp:gp,gl:gl,np:np,pf:pf,best:best===-Infinity?0:best,worst:worst===Infinity?0:worst,exp:exp,equity:equity,bal:bal,hwm:hwm,hwmDate:hwmDate,pnlHwm:bal-hwm,weekly:weekly,long:splitSt("BUY"),short:splitSt("SELL")};
}

        h("button",{onClick:function(){setStep("intro");setErr("")},style:Object.assign({},BS,{width:"100%",padding:"14px",fontSize:12,marginTop:8,background:"none",border:"1px solid #1e1e1e",color:"#555"})},"Back")
      )
    )
  );
}

// ── STATS BAR ──
function StatsBar(props){
  var trades=props.trades;
  var cl=trades.filter(function(t){var r=getAccRes(t,null);return r.outcome&&!r.outcome.includes("Running")});
  var wins=cl.filter(function(t){return getAccRes(t,null).outcome.includes("Win")}).length;
  var wr=cl.length?Math.round(wins/cl.length*100)+"%":"–";
  var net=cl.reduce(function(s,t){return s+(parseFloat(getAccRes(t,null).actualPct)||0)},0);
  var avg=cl.length?(net/cl.length).toFixed(2):null;
  return h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5,marginBottom:14}},
    [[String(trades.length),"Trades","#e0e0e0"],[wr,"Win Rate",cl.length&&wins/cl.length>=0.4?"#34d399":"#ff4444"],[(net?(net>=0?"+":"")+net.toFixed(2)+"%":"–"),"Net P&L",net>=0?"#34d399":"#ff4444"],[(avg?(parseFloat(avg)>=0?"+":"")+avg+"%":"–"),"Avg/Trade","#38bdf8"]].map(function(vlc){
      return h("div",{key:vlc[1],style:{background:"#0c0c0c",border:"1px solid #151515",borderRadius:7,padding:"9px 6px",textAlign:"center"}},
        h("div",{style:{fontFamily:"'DM Mono',monospace",fontSize:16,fontWeight:"bold",color:vlc[2]}},vlc[0]),
        h("div",{style:{fontFamily:"'DM Mono',monospace",fontSize:9,color:"#3a3a3a",letterSpacing:2,textTransform:"uppercase",marginTop:2}},vlc[1])
      );
    })
  );
}

// ── MAIN APP ──
function App(){
  var trState=useState([]);var trades=trState[0],setTrades=trState[1];
  var fiState=useState(DEF_FIRMS);var firms=fiState[0],setFirms=fiState[1];
  var ruState=useState(DEF_RULES);var rules=ruState[0],setRules=ruState[1];
  var pgState=useState("journal");var page=pgState[0],setPage=pgState[1];
  var flState=useState("all");var filter=flState[0],setFilter=flState[1];
  var scState=useState(false);var showCloud=scState[0],setShowCloud=scState[1];
  var crState=useState(null);var creds=crState[0],setCreds=crState[1];
  var smState=useState("");var syncMsg=smState[0],setSyncMsg=smState[1];
  var ssState=useState("");var syncStatus=ssState[0],setSyncStatus=ssState[1];
  var ipState=useState(null);var installPrompt=ipState[0],setInstallPrompt=ipState[1];
  var saveTimer=useRef(null);
  var isLoading=useRef(true);

  useEffect(function(){
    var d=LS.read();
    if(d){setTrades(d.trades||[]);setFirms(d.firms||DEF_FIRMS);if(d.rules)setRules(d.rules)}
    var c=CREDS.get();
    if(c&&c.apiKey&&c.binId){
      setCreds(c);setSyncStatus("syncing");setSyncMsg("Syncing...");
      CLOUD.read(c.binId,c.apiKey).then(function(data){if(data){setTrades(data.trades||[]);setFirms(data.firms||DEF_FIRMS);if(data.rules)setRules(data.rules)}setSyncStatus("synced");setSyncMsg("Synced "+new Date().toLocaleTimeString()+" — "+c.binId.substring(0,8)+"...");isLoading.current=false}).catch(function(e){setSyncStatus("error");setSyncMsg("Sync failed: "+e.message);isLoading.current=false});
    } else {setSyncMsg("Saved locally");isLoading.current=false}
    var h2=function(e){e.preventDefault();setInstallPrompt(e)};
    window.addEventListener("beforeinstallprompt",h2);
    return function(){window.removeEventListener("beforeinstallprompt",h2)};
  },[]);

  function saveAll(t,f,r){
    var data={trades:t,firms:f,rules:r,savedAt:new Date().toISOString()};LS.write(data);
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(function(){
      var c=CREDS.get();
      if(c&&c.binId&&c.apiKey){setSyncStatus("syncing");setSyncMsg("Saving...");CLOUD.write(c.binId,c.apiKey,data).then(function(){setSyncStatus("synced");setSyncMsg("Saved "+new Date().toLocaleTimeString())}).catch(function(){setSyncStatus("error");setSyncMsg("Cloud save failed — kept locally")})}
      else setSyncMsg("Saved locally");
    },1500);
  }
  useEffect(function(){if(!isLoading.current)saveAll(trades,firms,rules)},[trades,firms,rules]);

  function manualSync(){var c=CREDS.get();if(!c){setShowCloud(true);return}setSyncStatus("syncing");setSyncMsg("Syncing...");CLOUD.read(c.binId,c.apiKey).then(function(data){if(data){setTrades(data.trades||[]);setFirms(data.firms||DEF_FIRMS);if(data.rules)setRules(data.rules)}setSyncStatus("synced");setSyncMsg("Synced "+new Date().toLocaleTimeString())}).catch(function(e){setSyncStatus("error");setSyncMsg("Sync failed: "+e.message)})}
  function exportBk(){var a=document.createElement("a");a.href="data:application/json;charset=utf-8,"+encodeURIComponent(JSON.stringify({trades:trades,firms:firms,rules:rules,savedAt:new Date().toISOString()},null,2));a.download="NBS_Backup_"+new Date().toISOString().substring(0,10)+".json";a.click()}
  function importBk(){var inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(d.trades)setTrades(d.trades);if(d.firms)setFirms(d.firms);if(d.rules)setRules(d.rules);alert("Imported "+(d.trades?d.trades.length:0)+" trades.")}catch(ex){alert("Invalid backup file.")}};r.readAsText(f)};inp.click()}

  if(showCloud)return h(CloudSetup,{onDone:function(c,data){if(c){setCreds(c);if(data){setTrades(data.trades||[]);setFirms(data.firms||DEF_FIRMS);if(data.rules)setRules(data.rules)}setSyncMsg("Cloud active — "+c.binId.substring(0,8)+"...");setSyncStatus("synced")}else{setSyncMsg("Saved locally");setSyncStatus("")}setShowCloud(false)}});

  var filtered=trades.filter(function(t){if(filter==="all")return true;var r=getAccRes(t,null);if(filter==="open")return !r.outcome||r.outcome.includes("Running");return r.outcome&&r.outcome.includes(filter)});
  function addTrade(t){setTrades(function(p){return [t].concat(p)})}
  function updateTrade(id,data){setTrades(function(p){return p.map(function(t){return t.id===id?Object.assign({},t,data):t})})}
  function deleteTrade(id){if(window.confirm("Delete this trade?"))setTrades(function(p){return p.filter(function(t){return t.id!==id})})}
  function addFirm(f){setFirms(function(p){return p.concat([f])})}
  function updateFirm(id,data){setFirms(function(p){return p.map(function(f){return f.id===id?Object.assign({},f,data):f})})}
  function deleteFirm(id){setFirms(function(p){return p.filter(function(f){return f.id!==id})});setTrades(function(p){return p.map(function(t){return Object.assign({},t,{firmIds:(t.firmIds||[]).filter(function(x){return x!==id})})})})}

  var syncColor=syncStatus==="synced"?"#34d399":syncStatus==="syncing"?"#f0a500":syncStatus==="error"?"#ff4444":"#444";
  var navItems=[{id:"journal",l:"Journal"},{id:"calendar",l:"Calendar"},{id:"firms",l:"Accounts"},{id:"rules",l:"Rules"},{id:"news",l:"News"},{id:"new",l:"+ Trade"}];

  return h("div",{style:{minHeight:"100vh",background:"#070707"}},
    h("div",{style:{position:"sticky",top:0,zIndex:50,background:"rgba(7,7,7,.97)",backdropFilter:"blur(14px)",borderBottom:"1px solid #111"}},
      h("div",{style:{maxWidth:720,margin:"0 auto",padding:"9px 13px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:7,flexWrap:"wrap"}},
        h("div",null,
          h("div",{style:{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:4,color:"#c8f135",textTransform:"uppercase",marginBottom:1}},"NBS Trading"),
          h("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:1,color:"white",lineHeight:1}},"Trade Journal v11")
        ),
        h("div",{style:{display:"flex",gap:3,flexWrap:"wrap",alignItems:"center"}},
          navItems.map(function(n){return h("button",{key:n.id,onClick:function(){setPage(n.id)},style:Object.assign({},BS,{padding:"6px 10px",fontSize:10,background:page===n.id?(n.id==="new"?"rgba(200,241,53,.12)":"#171717"):"none",border:"1px solid "+(page===n.id?(n.id==="new"?"rgba(200,241,53,.25)":"#252525"):"transparent"),color:page===n.id?(n.id==="new"?"#c8f135":"white"):"#555"})},n.l)}),
          h("div",{style:{display:"flex",gap:3,marginLeft:3}},
            h("button",{onClick:syncStatus==="error"?function(){CREDS.clear();setCreds(null);setShowCloud(true)}:creds?manualSync:function(){setShowCloud(true)},style:Object.assign({},BS,{padding:"6px 9px",fontSize:9,background:syncStatus==="error"?"rgba(255,68,68,.1)":"none",border:"1px solid "+(syncStatus==="error"?"rgba(255,68,68,.3)":creds?"#1e1e1e":"rgba(56,189,248,.2)"),color:creds?syncColor:"#38bdf8"})},syncStatus==="error"?"! fix":creds?(syncStatus==="syncing"?"~":"⊙"):"+Sync"),
            h("button",{onClick:exportBk,style:Object.assign({},BS,{padding:"6px 9px",fontSize:9,background:"none",border:"1px solid #1e1e1e",color:"#555"})},"save"),
            h("button",{onClick:importBk,style:Object.assign({},BS,{padding:"6px 9px",fontSize:9,background:"none",border:"1px solid #1e1e1e",color:"#555"})},"load"),
            installPrompt&&h("button",{onClick:function(){installPrompt.prompt()},style:Object.assign({},BS,{padding:"6px 9px",fontSize:9,background:"rgba(200,241,53,.08)",border:"1px solid rgba(200,241,53,.2)",color:"#c8f135"})},"install")
          )
        )
      ),
      syncMsg&&h("div",{style:{fontFamily:"'DM Mono',monospace",fontSize:9,color:syncColor,letterSpacing:1,textAlign:"center",padding:"2px 0 4px",borderTop:"1px solid #0e0e0e"}},syncMsg)
    ),
    h("div",{style:{maxWidth:720,margin:"0 auto",padding:"15px 13px"}},
      page==="new"&&h(NewTradeForm,{onSave:function(t){addTrade(t);setPage("journal")},onCancel:function(){setPage("journal")},firms:firms}),
      page==="journal"&&h("div",{className:"fade"},
        h(StatsBar,{trades:trades}),
        h("div",{style:{display:"flex",gap:4,marginBottom:11,flexWrap:"wrap"}},
          ["all","open","Win","Loss","Breakeven"].map(function(fv){return h("button",{key:fv,onClick:function(){setFilter(fv)},style:Object.assign({},BS,{padding:"5px 9px",fontSize:9,background:filter===fv?"#171717":"none",border:"1px solid "+(filter===fv?"#252525":"#111"),color:filter===fv?"white":"#444"})},fv)})
        ),
        filtered.length===0
          ?h("div",{style:{textAlign:"center",padding:"60px 0",fontFamily:"'DM Mono',monospace",fontSize:12,color:"#222"}},trades.length===0?"No trades yet — tap + Trade":"No trades match filter")
          :filtered.map(function(t){return h(TradeCard,{key:t.id,trade:t,onUpdate:updateTrade,onDelete:deleteTrade,firms:firms,firmId:null})})
      ),
      page==="calendar"&&h("div",{className:"fade"},h(CalendarView,{trades:trades})),
      page==="firms"&&h(FirmsPage,{firms:firms,trades:trades,onUpdate:updateFirm,onDelete:deleteFirm,onAdd:addFirm,onReorder:function(arr){setFirms(arr)},onUpdateTrade:updateTrade,onDeleteTrade:deleteTrade}),
      page==="rules"&&h(RulesPage,{rules:rules,onUpdate:function(r){setRules(r)}}),
      page==="news"&&h(ForexNews,null)
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
})();
</script>
</body>
</html>
