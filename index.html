// ── HELPERS ──
var MN={fontFamily:"'DM Mono',monospace"};
function nowTs(){return new Date().toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit",hour12:false}).replace(","," —")}
function scoreEntry(f){return[f.c1,f.c2,f.c3,f.c4,f.c5,f.c6,f.c7,f.c8].filter(Boolean).length}
function pipSz(p){return p&&p.toUpperCase().includes("JPY")?0.01:0.0001}
function pipVal(p,price){return p&&p.toUpperCase().includes("JPY")?1000/(price||150):10}
function calcLots(pair,entry,sl,riskPct,acct){
  var e=parseFloat(entry),s=parseFloat(sl),r=parseFloat(riskPct),a=parseFloat(acct);
  if(!e||!s||!r||!a||e===s)return null;
  return Math.floor((a*r/100)/(Math.abs(e-s)/pipSz(pair)*pipVal(pair,e))*100)/100;
}
function calcRR(e,sl,tp,dir){
  var ev=parseFloat(e),sv=parseFloat(sl),tv=parseFloat(tp);
  if(!ev||!sv||!tv||ev===sv)return null;
  return parseFloat(((dir==="BUY"?tv-ev:ev-tv)/Math.abs(ev-sv)).toFixed(2));
}
function rrC(r){return r>=4?"#34d399":r>=2?"#c8f135":r>=1?"#f0a500":"#ff4444"}
function parseDate(ts){if(!ts)return null;try{if(ts instanceof Date){return isNaN(ts)?null:ts;}var s=String(ts).trim();s=s.replace(/\s*[—–]\s*/g," ").replace(/\s+at\s+/gi," ").replace(/\s+/g," ");var d=new Date(s);if(!isNaN(d))return d;var s2=s.replace(/\./g,"-");d=new Date(s2);if(!isNaN(d))return d;var iso=s.replace(/ /g,"T");d=new Date(iso);return isNaN(d)?null:d}catch(e){return null}}
function dKey(d){if(!d)return null;var dt=d instanceof Date?d:new Date(d);if(isNaN(dt))return null;return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0")}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r}
function fmtC(n){if(n==null||isNaN(n))return"–";var s=Math.abs(n)>=1000?"$"+(Math.abs(n)/1000).toFixed(1)+"k":"$"+Math.abs(n).toFixed(0);return n<0?"-"+s:"+"+s}
function fmtP(n){return n==null||isNaN(n)?"–":(n>=0?"+":"")+n.toFixed(2)+"%"}
function getWk(d){var t=new Date(d);t.setHours(0,0,0,0);var day=t.getDay()||7;t.setDate(t.getDate()+1-day);return t.toISOString().substring(0,10)}

// ── PER-ACCOUNT RESULT ──
function getAccRes(trade,firmId){
  var root={outcome:trade.outcome||"",actualPct:trade.actualPct||"",exitPrice:trade.exitPrice||"",exitWhy:trade.exitWhy||"",afterNotes:trade.afterNotes||"",photoAfter:trade.photoAfter||"",exitTimestamp:trade.exitTimestamp||"",xc1:trade.xc1||false,xc2:trade.xc2||false,xc3:trade.xc3||false,xc4:trade.xc4||false};
  if(firmId==null)return root;
  var ar=trade.accountResults||{};
  return ar[String(firmId)]?ar[String(firmId)]:root;
}
// Returns best closed outcome for a trade across ALL accounts (perf/calendar/statsbar)
function getCanonicalRes(trade){
  var root={outcome:trade.outcome||"",actualPct:trade.actualPct||"",exitPrice:trade.exitPrice||"",exitWhy:trade.exitWhy||"",afterNotes:trade.afterNotes||"",photoAfter:trade.photoAfter||"",exitTimestamp:trade.exitTimestamp||"",xc1:trade.xc1||false,xc2:trade.xc2||false,xc3:trade.xc3||false,xc4:trade.xc4||false};
  if(root.outcome&&!root.outcome.includes("Running")&&root.actualPct!=="")return root;
  var ar=trade.accountResults||{};
  var ids=trade.firmIds||[];
  for(var i=0;i<ids.length;i++){var r=ar[String(ids[i])];if(r&&r.outcome&&!r.outcome.includes("Running")&&r.actualPct!==""&&r.actualPct!=null)return r;}
  var keys=Object.keys(ar);
  for(var j=0;j<keys.length;j++){var r2=ar[keys[j]];if(r2&&r2.outcome&&!r2.outcome.includes("Running")&&r2.actualPct!==""&&r2.actualPct!=null)return r2;}
  return root;
}
function saveOneAcc(trade,firmId,data){
  if(firmId==null)return data;
  var ar=Object.assign({},trade.accountResults||{});
  ar[String(firmId)]=data;
  return{accountResults:ar};
}
function saveAllAcc(trade,data){
  var ar=Object.assign({},trade.accountResults||{});
  (trade.firmIds||[]).forEach(function(id){ar[String(id)]=data;});
  return Object.assign({},data,{accountResults:ar});
}
function tradePnl(t,acctSize,firmId){
  var r=getAccRes(t,firmId);
  var p=parseFloat(r.actualPct);
  return isNaN(p)?null:(parseFloat(acctSize)||100000)*p/100;
}
// ── PERFORMANCE HELPERS ──
function perfClosedTrades(trades){
  return (trades||[]).filter(function(t){
    var r=getCanonicalRes(t);
    return r.outcome && !r.outcome.includes("Running") && r.actualPct!=="" && r.actualPct!=null && !isNaN(parseFloat(r.actualPct));
  });
}
function perfMonthKey(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")}
function perfMonthlyMap(trades){
  var m={};
  perfClosedTrades(trades).forEach(function(t){
    var d=parseDate(t.timestamp); if(!d) return;
    var k=perfMonthKey(d), p=parseFloat(getCanonicalRes(t).actualPct)||0;
    if(!m[k]) m[k]={ret:0,trades:0,wins:0,losses:0};
    m[k].ret+=p; m[k].trades++;
    if(p>0)m[k].wins++; else if(p<0)m[k].losses++;
  });
  return m;
}
function perfOrderedMonthKeys(m){
  return Object.keys(m).sort(function(a,b){return new Date(a+"-01")-new Date(b+"-01")});
}
function perfMean(arr){if(!arr.length)return 0; return arr.reduce(function(a,b){return a+b},0)/arr.length}
function perfStd(arr){
  if(arr.length<2)return 0;
  var mu=perfMean(arr);
  var v=arr.reduce(function(a,b){return a+Math.pow(b-mu,2)},0)/(arr.length-1);
  return Math.sqrt(v);
}
function perfDownsideDev(arr){
  var neg=arr.filter(function(x){return x<0});
  if(!neg.length)return 0;
  var v=neg.reduce(function(a,b){return a+Math.pow(b,2)},0)/neg.length;
  return Math.sqrt(v);
}
function perfAnnualized(monthlyReturns){
  if(!monthlyReturns.length)return 0;
  var eq=1;
  monthlyReturns.forEach(function(r){eq*=(1+r/100);});
  return (Math.pow(eq,12/monthlyReturns.length)-1)*100;
}
function perfEquitySeries(trades){
  var closed=perfClosedTrades(trades).slice().sort(function(a,b){return (parseDate(a.timestamp)||0)-(parseDate(b.timestamp)||0)});
  var eq=100, out=[{date:null,bal:eq,pct:0}];
  closed.forEach(function(t){
    var p=parseFloat(getCanonicalRes(t).actualPct)||0;
    eq=eq*(1+p/100);
    out.push({date:parseDate(t.timestamp),bal:eq,pct:p,trade:t});
  });
  return out;
}
function perfDrawdownSeries(equity){
  var peak=equity.length?equity[0].bal:100;
  var arr=[], maxDD=0, curStart=null, maxDur=0;
  equity.forEach(function(e){
    if(e.bal>peak){peak=e.bal;}
    var dd=peak?((e.bal-peak)/peak*100):0;
    arr.push({date:e.date,dd:dd,bal:e.bal});
    if(dd<maxDD)maxDD=dd;
  });
  var runStart=null,runPeak=equity.length?equity[0].bal:100, lastDate=null;
  equity.forEach(function(e){
    if(e.bal>=runPeak){runPeak=e.bal; runStart=e.date;}
    if(e.bal<runPeak && runStart && e.date){ lastDate=e.date; }
    if(e.bal>=runPeak && runStart && lastDate){
      var dur=Math.floor((e.date-lastDate)/86400000);
      if(dur>maxDur)maxDur=dur;
      lastDate=null;
    }
  });
  var currentDD=arr.length?arr[arr.length-1].dd:0;
  return {series:arr,maxDD:Math.abs(maxDD),currentDD:Math.abs(currentDD),maxDuration:maxDur};
}
function perfPFExpectancy(trades){
  var closed=perfClosedTrades(trades);
  var wins=closed.filter(function(t){return parseFloat(getCanonicalRes(t).actualPct)>0});
  var losses=closed.filter(function(t){return parseFloat(getCanonicalRes(t).actualPct)<0});
  var gp=wins.reduce(function(a,t){return a+parseFloat(getCanonicalRes(t).actualPct)},0);
  var gl=Math.abs(losses.reduce(function(a,t){return a+parseFloat(getCanonicalRes(t).actualPct)},0));
  var pf=gl>0?gp/gl:(wins.length?99:0);
  var aw=wins.length?gp/wins.length:0;
  var al=losses.length?gl/losses.length:0;
  var tot=closed.length;
  var exp=tot?((wins.length/tot)*aw)-((losses.length/tot)*al):0;
  return {pf:pf,exp:exp,wins:wins.length,losses:losses.length,total:tot};
}
function perfAvgRAndStreaks(trades){
  var closed=perfClosedTrades(trades).slice().sort(function(a,b){return (parseDate(a.timestamp)||0)-(parseDate(b.timestamp)||0)});
  var rs=[], cw=0,cl=0,mw=0,ml=0;
  closed.forEach(function(t){
    var ap=parseFloat(getCanonicalRes(t).actualPct), rp=parseFloat(t.riskPct||0);
    var r=(!isNaN(ap)&&!isNaN(rp)&&rp>0)?(ap/rp):null;
    if(r!=null && isFinite(r))rs.push(r);
    if(ap>0){cw++;cl=0;if(cw>mw)mw=cw;}
    else if(ap<0){cl++;cw=0;if(cl>ml)ml=cl;}
    else{cw=0;cl=0;}
  });
  return {avgR:rs.length?perfMean(rs):0,maxWins:mw,maxLosses:ml,rValues:rs};
}
function perfSetupWinRates(trades){
  var closed=perfClosedTrades(trades), m={};
  closed.forEach(function(t){
    var s=t.setupType||"OTHER", p=parseFloat(getCanonicalRes(t).actualPct)||0;
    if(!m[s])m[s]={t:0,w:0};
    m[s].t++; if(p>0)m[s].w++;
  });
  return Object.keys(m).map(function(k){
    var o=m[k];
    return {setup:k,total:o.t,wr:o.t?o.w/o.t*100:0};
  }).sort(function(a,b){return b.total-a.total});
}
function perfRolling(arr,win,fn){
  var out=[];
  for(var i=0;i<arr.length;i++){
    if(i+1<win){out.push(null);continue;}
    var sub=arr.slice(i+1-win,i+1);
    out.push(fn(sub));
  }
  return out;
}
function perfCorr(a,b){
  var n=Math.min(a.length,b.length);
  if(n<2)return null;
  var x=a.slice(a.length-n), y=b.slice(b.length-n);
  var mx=perfMean(x), my=perfMean(y);
  var num=0,dx=0,dy=0;
  for(var i=0;i<n;i++){
    var vx=x[i]-mx, vy=y[i]-my;
    num+=vx*vy; dx+=vx*vx; dy+=vy*vy;
  }
  if(!dx||!dy)return null;
  return num/Math.sqrt(dx*dy);
}
// ADD AFTER EXISTING HELPERS (same <script> as calcStats)
function rpt_monthKey(d){if(!d||isNaN(d))return null;return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")}
function rpt_quarterKey(d){if(!d||isNaN(d))return null;return d.getFullYear()+"-Q"+(Math.floor(d.getMonth()/3)+1)}
function rpt_orderedKeys(map){return Object.keys(map).sort(function(a,b){return new Date(a+"-01")-new Date(b+"-01")})}
function rpt_monthMap(trades){
  var m={};
  trades.forEach(function(t){
    var d=parseDate(t.timestamp);if(!d)return;
    var k=rpt_monthKey(d),r=getCanonicalRes(t),p=parseFloat(r.actualPct);
    if(isNaN(p)||!r.outcome||r.outcome.includes("Running"))return;
    if(!m[k])m[k]={ret:0,trades:[]};
    m[k].ret+=p;m[k].trades.push(t);
  });
  return m;
}
function rpt_monthArr(m){return rpt_orderedKeys(m).map(function(k){return m[k].ret||0})}
function rpt_cumFromMonthMap(m,until){
  var keys=rpt_orderedKeys(m).filter(function(k){return !until||k<=until});
  var eq=1;keys.forEach(function(k){eq*=(1+(m[k].ret||0)/100)});
  return (eq-1)*100;
}
function rpt_ytd(m,target){
  if(!target)return 0;
  var p=target.split("-"),y=p[0],mm=parseInt(p[1],10),eq=1;
  for(var i=1;i<=mm;i++){var k=y+"-"+String(i).padStart(2,"0");if(m[k])eq*=(1+(m[k].ret||0)/100)}
  return (eq-1)*100;
}
function rpt_annFromMonthMap(m){
  var keys=rpt_orderedKeys(m);if(!keys.length)return 0;
  var cum=rpt_cumFromMonthMap(m)/100;
  return (Math.pow(1+cum,12/keys.length)-1)*100;
}
function rpt_sharpeSortino(arr){
  if(arr.length<2)return{sharpe:0,sortino:0};
  var mean=arr.reduce(function(a,b){return a+b},0)/arr.length;
  var v=arr.reduce(function(a,b){return a+Math.pow(b-mean,2)},0)/(arr.length-1);
  var sd=Math.sqrt(v)||0;
  var neg=arr.filter(function(x){return x<0});
  var dsd=0;
  if(neg.length>1){
    var dm=neg.reduce(function(a,b){return a+b},0)/neg.length;
    dsd=Math.sqrt(neg.reduce(function(a,b){return a+Math.pow(b-dm,2)},0)/(neg.length-1));

function PerfLineChart(props){
  var data=props.data||[], hgt=props.h||180;
  if(!data.length)return h("div",{style:{height:hgt,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Mono',monospace",fontSize:11,color:"#333"}},"No data");
  var vals=data.map(function(d){return d==null?null:d;}).filter(function(v){return v!=null;});
  if(!vals.length)return h("div",{style:{height:hgt}});
  var mn=Math.min.apply(null,vals), mx=Math.max.apply(null,vals);
  if(mx===mn){mx+=1;mn-=1;}
  var W=760,H=hgt,P=20;
  function x(i){return P+(i/(data.length-1||1))*(W-P*2);}
  function y(v){return H-P-((v-mn)/(mx-mn))*(H-P*2);}
  var pts=data.map(function(v,i){return v==null?null:(x(i).toFixed(1)+","+y(v).toFixed(1));}).filter(Boolean).join(" ");
  return h("svg",{viewBox:"0 0 "+W+" "+H,style:{width:"100%",height:hgt,display:"block"}},
    h("line",{x1:P,y1:H-P,x2:W-P,y2:H-P,stroke:"#202020",strokeWidth:"1"}),
    h("polyline",{points:pts,fill:"none",stroke:props.col||"#38bdf8",strokeWidth:"2",strokeLinecap:"round",strokeLinejoin:"round"})
  );
}
function PerfBarChart(props){

  var vals=data.map(function(d){return d.v;});
  var maxAbs=Math.max(1,Math.max.apply(null,vals.map(function(v){return Math.abs(v);}))); 
  var W=760,H=hgt,P=24,bw=(W-P*2)/data.length*0.7,gap=(W-P*2)/data.length*0.3;
  var zeroY=H/2;
  return h("svg",{viewBox:"0 0 "+W+" "+H,style:{width:"100%",height:hgt,display:"block"}},
    h("line",{x1:P,y1:zeroY,x2:W-P,y2:zeroY,stroke:"#222",strokeWidth:"1"}),
    data.map(function(d,i){

    })

function PerfHistogram(props){

  var mn=Math.min.apply(null,arr), mx=Math.max.apply(null,arr);

function perfClosedTradesAcc(trades,firmId){
  return (trades||[]).filter(function(t){
    var r=firmId!=null?getAccRes(t,firmId):getCanonicalRes(t);
    return r.outcome && !r.outcome.includes("Running") && r.actualPct!=="" && r.actualPct!=null && !isNaN(parseFloat(r.actualPct));
  });
}
function perfMonthlyMapAcc(trades,firmId){
  var m={};
  perfClosedTradesAcc(trades,firmId).forEach(function(t){
    var d=parseDate(t.timestamp); if(!d) return;
    var k=perfMonthKey(d), p=parseFloat((firmId!=null?getAccRes(t,firmId):getCanonicalRes(t)).actualPct)||0;
    if(!m[k]) m[k]={ret:0,trades:0,wins:0,losses:0};
    m[k].ret+=p; m[k].trades++;
    if(p>0)m[k].wins++; else if(p<0)m[k].losses++;
  });
  return m;
}
function perfEquitySeriesAcc(trades,firmId){
  var closed=perfClosedTradesAcc(trades,firmId).slice().sort(function(a,b){return (parseDate(a.timestamp)||0)-(parseDate(b.timestamp)||0)});
  var eq=100, out=[{date:null,bal:eq,pct:0}];
  closed.forEach(function(t){
    var p=parseFloat((firmId!=null?getAccRes(t,firmId):getCanonicalRes(t)).actualPct)||0;
    eq=eq*(1+p/100);
    out.push({date:parseDate(t.timestamp),bal:eq,pct:p,trade:t});
  });
  return out;
}

  var wins=closed.filter(function(t){return parseFloat(getR(t).actualPct)>0});
  var losses=closed.filter(function(t){return parseFloat(getR(t).actualPct)<0});
  var gp=wins.reduce(function(a,t){return a+parseFloat(getR(t).actualPct)},0);
  var gl=Math.abs(losses.reduce(function(a,t){return a+parseFloat(getR(t).actualPct)},0));
  var pf=gl>0?gp/gl:(wins.length?99:0);
  var aw=wins.length?gp/wins.length:0;
  var al=losses.length?gl/losses.length:0;
  var tot=closed.length;
  var exp=tot?((wins.length/tot)*aw)-((losses.length/tot)*al):0;
  return {pf:pf,exp:exp,wins:wins.length,losses:losses.length,total:tot};
}
function perfAvgRAndStreaksAcc(trades,firmId){
  var getR=function(t){return firmId!=null?getAccRes(t,firmId):getCanonicalRes(t)};
  var closed=perfClosedTradesAcc(trades,firmId).slice().sort(function(a,b){return (parseDate(a.timestamp)||0)-(parseDate(b.timestamp)||0)});
  var rs=[], cw=0,cl=0,mw=0,ml=0;
  closed.forEach(function(t){
    var ap=parseFloat(getR(t).actualPct), rp=parseFloat(t.riskPct||0);
    var r=(!isNaN(ap)&&!isNaN(rp)&&rp>0)?(ap/rp):null;
    if(r!=null && isFinite(r))rs.push(r);
    if(ap>0){cw++;cl=0;if(cw>mw)mw=cw;}
    else if(ap<0){cl++;cw=0;if(cl>ml)ml=cl;}
    else{cw=0;cl=0;}
  });
  return {avgR:rs.length?perfMean(rs):0,maxWins:mw,maxLosses:ml,rValues:rs};
}
function perfSetupWinRatesAcc(trades,firmId){
  var getR=function(t){return firmId!=null?getAccRes(t,firmId):getCanonicalRes(t)};
  var closed=perfClosedTradesAcc(trades,firmId), m={};
  closed.forEach(function(t){
    var s=t.setupType||"OTHER", p=parseFloat(getR(t).actualPct)||0;
    if(!m[s])m[s]={t:0,w:0};
    m[s].t++; if(p>0)m[s].w++;

  return Object.keys(m).map(function(k){
    var o=m[k];
    return {setup:k,total:o.t,wr:o.t?o.w/o.t*100:0};
  }).sort(function(a,b){return b.total-a.total});
}

            h("button",{onClick:syncStatus==="error"?function(){CREDS.clear();setCreds(null);setShowCloud(true)}:creds?manualSync:function(){setShowCloud(true)},style:Object.assign({},BS,{padding:"6px 9px",fontSize:9,background:syncStatus==="error"?"rgba(255,68,68,.1)":"none",border:"1px solid "+(syncStatus==="error"?"rgba(255,68,68,.3)":creds?"#1e1e1e":"rgba(56,189,248,.2)"),color:creds?syncColor:"#38bdf8"})},syncStatus==="error"?"! fix":creds?(syncStatus==="syncing"?"~":"⊙"):"+Sync"),
            h("button",{onClick:exportBk,style:Object.assign({},BS,{padding:"6px 9px",fontSize:9,background:"none",border:"1px solid #1e1e1e",color:"#555"})},"save"),
            h("button",{onClick:importBk,style:Object.assign({},BS,{padding:"6px 9px",fontSize:9,background:"none",border:"1px solid #1e1e1e",color:"#555"})},"load"),
            installPrompt&&h("button",{onClick:function(){installPrompt.prompt()},style:Object.assign({},BS,{padding:"6px 9px",fontSize:9,background:"rgba(200,241,53,.08)",border:"1px solid rgba(200,241,53,.2)",color:"#c8f135"})},"install")
          )
        )
      ),
      syncMsg&&h("div",{style:{fontFamily:"'DM Mono',monospace",fontSize:9,color:syncColor,letterSpacing:1,textAlign:"center",padding:"2px 0 4px",borderTop:"1px solid #0e0e0e"}},syncMsg)
    ),
    h("div",{style:{maxWidth:720,margin:"0 auto",padding:"15px 13px"}},
      page==="new"&&h(NewTradeForm,{onSave:function(t){addTrade(t);setPage("journal")},onCancel:function(){setPage("journal")},firms:firms,trades:trades}),
      page==="journal"&&h("div",{className:"fade"},
        h(StatsBar,{trades:trades}),
        h("div",{style:{display:"flex",gap:4,marginBottom:11,flexWrap:"wrap"}},
          ["all","open","Win","Loss","Breakeven"].map(function(fv){return h("button",{key:fv,onClick:function(){setFilter(fv)},style:Object.assign({},BS,{padding:"5px 9px",fontSize:9,background:filter===fv?"#171717":"none",border:"1px solid "+(filter===fv?"#252525":"#111"),color:filter===fv?"white":"#444"})},fv)})
        ),
        filtered.length===0
          ?h("div",{style:{textAlign:"center",padding:"60px 0",fontFamily:"'DM Mono',monospace",fontSize:12,color:"#222"}},trades.length===0?"No trades yet — tap + Trade":"No trades match filter")
          :filtered.map(function(t){return h(TradeCard,{key:t.id,trade:t,onUpdate:updateTrade,onDelete:deleteTrade,firms:firms,firmId:null,allTrades:trades})})
      ),
      page==="calendar"&&h("div",{className:"fade"},h(CalendarView,{trades:trades})),
      page==="firms"&&h(FirmsPage,{firms:firms,trades:trades,onUpdate:updateFirm,onDelete:deleteFirm,onAdd:addFirm,onReorder:function(arr){setFirms(arr)},onUpdateTrade:updateTrade,onDeleteTrade:deleteTrade}),
      page==="rules"&&h(RulesPage,{rules:rules,onUpdate:function(r){setRules(r)}}),
      page==="news"&&h(ForexNews,null),
		page==="performance"&&h(PerformancePage,{trades:trades,firms:firms}),
		page==="reports"&&h(ReportsPage,{trades:trades,firms:firms})
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
})();
</script>
