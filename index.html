// RULES PAGE — editable trading rules
// ═══════════════════════════════════════════════════════════
function RulesPage({rules,onUpdate}){
  const[editing,setEditing]=useState(null); // id of rule being edited
  const[editText,setEditText]=useState("");
  const[adding,setAdding]=useState(false);
  const[newText,setNewText]=useState("");
  const[newCat,setNewCat]=useState("Entry");
  const cats=["Entry","Risk","Mindset","Other"];
  const catCol={Entry:"#c8f135",Risk:"#ff4444",Mindset:"#38bdf8",Other:"#888"};

  function startEdit(r){setEditing(r.id);setEditText(r.text);}
  function saveEdit(r){onUpdate(rules.map(x=>x.id===r.id?{...x,text:editText}:x));setEditing(null);}
  function deleteRule(id){if(window.confirm("Delete this rule?"))onUpdate(rules.filter(x=>x.id!==id));}
  function addRule(){
    if(!newText.trim())return;
    onUpdate([...rules,{id:Date.now(),category:newCat,text:newText.trim()}]);
    setNewText("");setAdding(false);
  }

  const grouped={};
  cats.forEach(c=>{grouped[c]=rules.filter(r=>r.category===c);});

  return(
    <div className="fade">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,color:"white",letterSpacing:.5}}>Trading Rules</div>
        <button onClick={()=>setAdding(true)} style={{...BS,background:"rgba(200,241,53,.07)",border:"1px solid rgba(200,241,53,.17)",color:"#c8f135",padding:"8px 13px",fontSize:12}}>+ Add Rule</button>
      </div>
      <div style={{...mono,fontSize:11,color:"#444",marginBottom:16,lineHeight:1.7}}>Your system rules. Tap any rule to edit. These save with your data.</div>

      {adding&&(
        <div style={{background:"#0d0d0d",border:"1px solid rgba(200,241,53,.2)",borderRadius:9,padding:14,marginBottom:14}}>
          <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}>
            {cats.map(c=>(
              <button key={c} onClick={()=>setNewCat(c)} style={{...BS,padding:"5px 10px",fontSize:10,background:newCat===c?catCol[c]+"22":"none",border:"1px solid "+(newCat===c?catCol[c]+"55":"#1e1e1e"),color:newCat===c?catCol[c]:"#555"}}>{c}</button>
            ))}
          </div>
          <textarea value={newText} onChange={e=>setNewText(e.target.value)} placeholder="Enter your rule..." rows={2} style={{...IS,resize:"none",width:"100%",marginBottom:8,fontSize:13}}/>
          <div style={{display:"flex",gap:7}}>
            <button onClick={addRule} style={{...BS,background:"rgba(200,241,53,.09)",border:"1px solid rgba(200,241,53,.2)",color:"#c8f135",padding:"8px 14px",fontSize:12}}>Save</button>
            <button onClick={()=>{setAdding(false);setNewText("");}} style={{...BS,background:"none",border:"1px solid #1e1e1e",color:"#555",padding:"8px 14px",fontSize:12}}>Cancel</button>
          </div>
        </div>
      )}

      {cats.map(cat=>{
        const catRules=grouped[cat]||[];
        if(!catRules.length)return null;
        return(
          <div key={cat} style={{marginBottom:18}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <div style={{...mono,fontSize:10,color:catCol[cat]||"#888",letterSpacing:3,textTransform:"uppercase"}}>{cat}</div>
              <div style={{flex:1,height:1,background:"#151515"}}/>
            </div>
            {catRules.map((r,i)=>(
              <div key={r.id} style={{background:"#0a0a0a",border:"1px solid #141414",borderLeft:"3px solid "+(catCol[r.category]||"#333"),borderRadius:7,padding:"11px 13px",marginBottom:6,display:"flex",gap:10,alignItems:"flex-start"}}>
                <div style={{...mono,fontSize:13,color:"#333",marginTop:1,flexShrink:0}}>{i+1}.</div>
                {editing===r.id?(
                  <div style={{flex:1}}>
                    <textarea value={editText} onChange={e=>setEditText(e.target.value)} rows={2} style={{...IS,resize:"none",width:"100%",marginBottom:7,fontSize:13}}/>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>saveEdit(r)} style={{...BS,background:"rgba(200,241,53,.09)",border:"1px solid rgba(200,241,53,.2)",color:"#c8f135",padding:"6px 12px",fontSize:11}}>Save</button>
                      <button onClick={()=>setEditing(null)} style={{...BS,background:"none",border:"1px solid #1e1e1e",color:"#555",padding:"6px 12px",fontSize:11}}>Cancel</button>
                    </div>
                  </div>
                ):(
                  <div style={{flex:1,display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                    <div style={{fontSize:14,color:"#c0c0c0",lineHeight:1.6}}>{r.text}</div>
                    <div style={{display:"flex",gap:5,flexShrink:0}}>
                      <button onClick={()=>startEdit(r)} style={{...BS,background:"none",border:"1px solid #1e1e1e",color:"#555",padding:"4px 9px",fontSize:11}}>edit</button>
                      <button onClick={()=>deleteRule(r.id)} style={{...BS,background:"none",border:"1px solid #1e1e1e",color:"#444",padding:"4px 9px",fontSize:11}}>x</button>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// STATS BAR
// ═══════════════════════════════════════════════════════════
function StatsBar({trades}){
  const cl=trades.filter(t=>t.outcome&&!t.outcome.includes("Running"));
  const wins=cl.filter(t=>t.outcome?.includes("Win")).length;
  const wr=cl.length?Math.round(wins/cl.length*100)+"%":"–";
  const net=cl.reduce((s,t)=>s+(parseFloat(t.actualPct)||0),0);
  const avg=cl.length?(net/cl.length).toFixed(2):null;
  return<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5,marginBottom:14}}>
    {[[`${trades.length}`,"Trades","#e0e0e0"],[wr,"Win Rate",cl.length&&wins/cl.length>=0.4?"#34d399":"#ff4444"],[(net?(net>=0?"+":"")+net.toFixed(2)+"%":"–"),"Net P&L",net>=0?"#34d399":"#ff4444"],[(avg?(parseFloat(avg)>=0?"+":"")+avg+"%":"–"),"Avg/Trade","#38bdf8"]].map(([v,l,c])=>(
      <div key={l} style={{background:"#0c0c0c",border:"1px solid #151515",borderRadius:7,padding:"9px 6px",textAlign:"center"}}>
        <div style={{...mono,fontSize:16,fontWeight:"bold",color:c}}>{v}</div>
        <div style={{...mono,fontSize:9,color:"#3a3a3a",letterSpacing:2,textTransform:"uppercase",marginTop:2}}>{l}</div>
      </div>
    ))}
  </div>;
}

// ═══════════════════════════════════════════════════════════
// CLOUD SETUP SCREEN
// ═══════════════════════════════════════════════════════════
function CloudSetup({onDone}){
  var[step,setStep]=useState("intro");
  var[token,setToken]=useState("");
  var[gistId,setGistId]=useState("");
  var[loading,setLoading]=useState(false);
  var[err,setErr]=useState("");

  async function createNew(){
    if(!token.trim()){setErr("Paste your GitHub token first.");return;}
    setLoading(true);setErr("");
    try{
      var id=await CLOUD.createBin(token.trim());
      CREDS.set({apiKey:token.trim(),binId:id});
      onDone({apiKey:token.trim(),binId:id},null);
    }catch(e){setErr(e.message);}
    setLoading(false);
  }
  async function connectExisting(){
    if(!token.trim()||!gistId.trim()){setErr("Fill in both fields.");return;}
    setLoading(true);setErr("");
    try{
      var data=await CLOUD.read(gistId.trim(),token.trim());
      CREDS.set({apiKey:token.trim(),binId:gistId.trim()});
      onDone({apiKey:token.trim(),binId:gistId.trim()},data);
    }catch(e){setErr(e.message);}
    setLoading(false);
  }

  var card={background:"#0d0d0d",border:"1px solid #1e1e1e",borderRadius:10,padding:16,marginBottom:10};
  var lbl={fontFamily:"'DM Mono',monospace",fontSize:10,color:"#c8f135",letterSpacing:2,marginBottom:8,textTransform:"uppercase",display:"block"};
  var inp={background:"#111",border:"1px solid #2a2a2a",borderRadius:6,padding:"10px 12px",fontSize:13,fontFamily:"'DM Mono',monospace",color:"#e0e0e0",width:"100%",outline:"none",display:"block",marginTop:6,boxSizing:"border-box"};
  var bigBtn={width:"100%",padding:"14px",borderRadius:7,cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:12,letterSpacing:2,textTransform:"uppercase",marginTop:10,border:"none"};
  var smBtn={padding:"9px 16px",borderRadius:6,border:"1px solid #1e1e1e",background:"none",color:"#555",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11,marginTop:8};

  return(
    React.createElement("div",{style:{minHeight:"100vh",background:"#070707",display:"flex",alignItems:"center",justifyContent:"center",padding:16}},
      React.createElement("div",{style:{maxWidth:500,width:"100%"}},
        React.createElement("div",{style:{textAlign:"center",marginBottom:24}},
          React.createElement("div",{style:{fontFamily:"'DM Mono',monospace",fontSize:9,color:"#c8f135",letterSpacing:4,textTransform:"uppercase",marginBottom:6}},"NBS Trading Journal"),
          React.createElement("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:36,color:"white",letterSpacing:.5,marginBottom:8}},"Connect Cloud Sync"),
          React.createElement("div",{style:{fontFamily:"'DM Mono',monospace",fontSize:13,color:"#555",lineHeight:1.8}},"Uses your free GitHub account. Private, only you can access it.")
        ),
        step==="intro"&&React.createElement("div",{className:"fade"},
          React.createElement("div",{style:{...card,border:"1px solid rgba(200,241,53,.2)",cursor:"pointer"},onClick:function(){setStep("new");},onMouseEnter:function(e){e.currentTarget.style.background="#111";},onMouseLeave:function(e){e.currentTarget.style.background="#0d0d0d";}},
            React.createElement("div",{style:{fontSize:15,fontWeight:"bold",color:"#c8f135",marginBottom:6}},"New — create GitHub Gist storage"),
            React.createElement("div",{style:{fontFamily:"'DM Mono',monospace",fontSize:12,color:"#777",lineHeight:1.7}},"Have a GitHub account? Get a token with gist access and paste it here. The app creates your storage automatically.")
          ),
          React.createElement("div",{style:{...card,cursor:"pointer"},onClick:function(){setStep("existing");},onMouseEnter:function(e){e.currentTarget.style.background="#111";},onMouseLeave:function(e){e.currentTarget.style.background="#0d0d0d";}},
            React.createElement("div",{style:{fontSize:15,fontWeight:"bold",color:"#888",marginBottom:6}},"Existing — connect from another device"),
            React.createElement("div",{style:{fontFamily:"'DM Mono',monospace",fontSize:12,color:"#555",lineHeight:1.7}},"Already set up on another device? Enter your token and Gist ID to sync.")
          ),
          React.createElement("div",{style:{...card,cursor:"pointer"},onClick:function(){CREDS.clear();onDone(null,null);},onMouseEnter:function(e){e.currentTarget.style.background="#111";},onMouseLeave:function(e){e.currentTarget.style.background="#0d0d0d";}},
            React.createElement("div",{style:{fontSize:15,fontWeight:"bold",color:"#555",marginBottom:6}},"Skip for now — local only"),
            React.createElement("div",{style:{fontFamily:"'DM Mono',monospace",fontSize:12,color:"#444",lineHeight:1.7}},"Saves in this browser only. Use the save/load buttons to back up manually.")
          )
        ),
        step==="new"&&React.createElement("div",{className:"fade"},
          React.createElement("div",{style:card},
            React.createElement("span",{style:lbl},"Step 1 — Go to GitHub"),
            React.createElement("div",{style:{fontFamily:"'DM Mono',monospace",fontSize:13,color:"#888",lineHeight:1.8}},
              "Go to ",React.createElement("a",{href:"https://github.com",target:"_blank",style:{color:"#38bdf8"}},"github.com")," and log in or sign up free."
            )
          ),
          React.createElement("div",{style:card},
            React.createElement("span",{style:lbl},"Step 2 — Create a token"),
            React.createElement("div",{style:{fontFamily:"'DM Mono',monospace",fontSize:13,color:"#888",lineHeight:1.8}},"Profile icon (top right) > Settings > Developer settings > Personal access tokens > Tokens (classic) > Generate new token > tick ",React.createElement("strong",{style:{color:"#e0e0e0"}},"gist")," > Generate > copy it"),
            React.createElement("input",{value:token,onChange:function(e){setToken(e.target.value);},placeholder:"Paste token here (ghp_...)",style:inp})
          ),
          React.createElement("div",{style:card},
            React.createElement("span",{style:lbl},"Step 3 — Create storage"),
            err&&React.createElement("div",{style:{fontFamily:"'DM Mono',monospace",fontSize:12,color:"#ff8888",marginBottom:10,padding:"8px 10px",background:"rgba(255,68,68,.06)",borderRadius:5}},err),
            React.createElement("button",{onClick:createNew,disabled:loading,style:{...bigBtn,background:loading?"#1a1a1a":"rgba(200,241,53,.1)",color:loading?"#555":"#c8f135",border:"1px solid rgba(200,241,53,.2)"}},loading?"Creating...":"Create My Gist Storage")
          ),
          React.createElement("button",{onClick:function(){setStep("intro");setErr("");},style:smBtn},"Back")
        ),
        step==="existing"&&React.createElement("div",{className:"fade"},
          React.createElement("div",{style:card},
            React.createElement("span",{style:lbl},"Connect existing Gist"),
            React.createElement("div",{style:{fontFamily:"'DM Mono',monospace",fontSize:13,color:"#888",marginBottom:4}},"GitHub Token (ghp_...):"),
            React.createElement("input",{value:token,onChange:function(e){setToken(e.target.value);},placeholder:"ghp_...",style:inp}),
            React.createElement("div",{style:{fontFamily:"'DM Mono',monospace",fontSize:13,color:"#888",marginTop:12,marginBottom:4}},"Gist ID:"),
            React.createElement("div",{style:{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#555",marginBottom:4}},"Find it at gist.github.com — it's the long code in the URL after your username"),
            React.createElement("input",{value:gistId,onChange:function(e){setGistId(e.target.value);},placeholder:"e.g. a1b2c3d4e5f67890abcd",style:{...inp,marginTop:0}})
          ),
          err&&React.createElement("div",{style:{fontFamily:"'DM Mono',monospace",fontSize:12,color:"#ff8888",padding:"8px 10px",background:"rgba(255,68,68,.06)",borderRadius:5,marginBottom:10}},err),
          React.createElement("button",{onClick:connectExisting,disabled:loading,style:{...bigBtn,background:loading?"#1a1a1a":"rgba(56,189,248,.1)",color:loading?"#555":"#38bdf8",border:"1px solid rgba(56,189,248,.2)"}},loading?"Connecting...":"Connect and Load Data"),
          React.createElement("button",{onClick:function(){setStep("intro");setErr("");},style:smBtn},"Back")
        )
      )
    )
  );
}
// ═══════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════
function App(){
  var[trades,setTrades]=useState([]);
  var[firms,setFirms]=useState(DEFAULT_FIRMS);
  var[rules,setRules]=useState(DEFAULT_RULES);
  var[page,setPage]=useState("journal");
  var[filter,setFilter]=useState("all");
  var[showCloudSetup,setShowCloudSetup]=useState(false);
  var[creds,setCreds]=useState(null);
  var[syncStatus,setSyncStatus]=useState("");
  var[syncMsg,setSyncMsg]=useState("");
  var[installPrompt,setInstallPrompt]=useState(null);
  var saveTimer=useRef(null);

  useEffect(function(){
    // Always load local data immediately
    var lsData=LS.read();
    if(lsData){setTrades(lsData.trades||[]);setFirms(lsData.firms||DEFAULT_FIRMS);if(lsData.rules)setRules(lsData.rules);}

    // If cloud creds exist, sync in background
    var c=CREDS.get();
    if(c&&c.apiKey&&c.binId){
      setCreds(c);
      setSyncStatus("syncing");setSyncMsg("Syncing with cloud...");
      CLOUD.read(c.binId,c.apiKey).then(function(data){
        if(data){setTrades(data.trades||[]);setFirms(data.firms||DEFAULT_FIRMS);if(data.rules)setRules(data.rules);}
        setSyncStatus("synced");setSyncMsg("Cloud synced " + new Date().toLocaleTimeString());
      }).catch(function(){
        setSyncStatus("offline");setSyncMsg("Offline — showing local data");
      });
    } else {
      setSyncMsg("Saved locally");
    }

    var h=function(e){e.preventDefault();setInstallPrompt(e);};
    window.addEventListener("beforeinstallprompt",h);
    return function(){window.removeEventListener("beforeinstallprompt",h);};
  },[]);

  function saveAll(newTrades,newFirms){
    var data={trades:newTrades,firms:newFirms,rules:rules,savedAt:new Date().toISOString()};
    LS.write(data);
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(function(){
      var c=CREDS.get();
      if(c&&c.binId&&c.apiKey){
        setSyncStatus("syncing");setSyncMsg("Saving to cloud...");
        CLOUD.write(c.binId,c.apiKey,data).then(function(){
          setSyncStatus("synced");setSyncMsg("Saved " + new Date().toLocaleTimeString());
        }).catch(function(){
          setSyncStatus("error");setSyncMsg("Cloud save failed — kept locally");
        });
      } else {
        setSyncMsg("Saved locally");
      }
    },1500);
  }

  useEffect(function(){saveAll(trades,firms);},[trades,firms,rules]);

  function manualSync(){
    var c=CREDS.get();if(!c)return;
    setSyncStatus("syncing");setSyncMsg("Syncing...");
    CLOUD.read(c.binId,c.apiKey).then(function(data){
      if(data){setTrades(data.trades||[]);setFirms(data.firms||DEFAULT_FIRMS);if(data.rules)setRules(data.rules);}
      setSyncStatus("synced");setSyncMsg("Synced " + new Date().toLocaleTimeString());
    }).catch(function(){
      setSyncStatus("error");setSyncMsg("Sync failed — check connection");
    });
  }

  function exportBackup(){
    var data={trades:trades,firms:firms,savedAt:new Date().toISOString()};
    var a=document.createElement("a");
    a.href="data:application/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(data,null,2));
    a.download="NBS_Backup_"+new Date().toISOString().substring(0,10)+".json";
    a.click();
  }
  function importBackup(){
    var inp=document.createElement("input");inp.type="file";inp.accept=".json";
    inp.onchange=function(e){
      var f=e.target.files[0];if(!f)return;
      var r=new FileReader();
      r.onload=function(ev){
        try{
          var d=JSON.parse(ev.target.result);
          if(d.trades)setTrades(d.trades);
          if(d.firms)setFirms(d.firms);
          alert("Imported "+(d.trades?d.trades.length:0)+" trades.");
        }catch(ex){alert("Invalid backup file.");}
      };
      r.readAsText(f);
    };
    inp.click();
  }

  if(showCloudSetup)return React.createElement(CloudSetup,{onDone:function(c,data){
    if(c){setCreds(c);if(data){setTrades(data.trades||[]);setFirms(data.firms||DEFAULT_FIRMS);if(data.rules)setRules(data.rules);}}
    setSyncMsg(c?"Cloud sync active":"Saved locally");
    setSyncStatus(c?"synced":"");
    setShowCloudSetup(false);
  }});

  var filtered=trades.filter(function(t){
    if(filter==="all")return true;
    if(filter==="open")return !t.outcome||t.outcome.includes("Running");
    return t.outcome&&t.outcome.includes(filter);
  });
  function addTrade(t){setTrades(function(p){return [t].concat(p);});}
  function updateTrade(id,data){setTrades(function(p){return p.map(function(t){return t.id===id?Object.assign({},t,data):t;});});}
  function deleteTrade(id){if(window.confirm("Delete this trade?"))setTrades(function(p){return p.filter(function(t){return t.id!==id;});});}
  function addFirm(f){setFirms(function(p){return p.concat([f]);});}
  function updateFirm(id,data){setFirms(function(p){return p.map(function(f){return f.id===id?Object.assign({},f,data):f;});});}
  function deleteFirm(id){
    setFirms(function(p){return p.filter(function(f){return f.id!==id;});});
    setTrades(function(p){return p.map(function(t){return Object.assign({},t,{firmIds:(t.firmIds||[]).filter(function(x){return x!==id;})});});});
  }

  var syncColor=syncStatus==="synced"?"#34d399":syncStatus==="syncing"?"#f0a500":syncStatus==="error"?"#ff4444":"#444";
  var navItems=[{id:"journal",l:"Journal"},{id:"calendar",l:"Calendar"},{id:"firms",l:"Accounts"},{id:"rules",l:"Rules"},{id:"news",l:"News"},{id:"new",l:"+ Trade"}];

  return(
    <div style={{minHeight:"100vh",background:"#070707"}}>
      <div style={{position:"sticky",top:0,zIndex:50,background:"rgba(7,7,7,.97)",backdropFilter:"blur(14px)",borderBottom:"1px solid #111"}}>
        <div style={{maxWidth:720,margin:"0 auto",padding:"9px 13px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:7,flexWrap:"wrap"}}>
          <div>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:4,color:"#c8f135",textTransform:"uppercase",marginBottom:1}}>NBS Trading</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:1,color:"white",lineHeight:1}}>Trade Journal</div>
          </div>
          <div style={{display:"flex",gap:3,flexWrap:"wrap",alignItems:"center"}}>
            {navItems.map(function(n){
              return <button key={n.id} onClick={function(){setPage(n.id);}} style={{...BS,padding:"6px 10px",fontSize:10,background:page===n.id?(n.id==="new"?"rgba(200,241,53,.12)":"#171717"):"none",border:"1px solid "+(page===n.id?(n.id==="new"?"rgba(200,241,53,.25)":"#252525"):"transparent"),color:page===n.id?(n.id==="new"?"#c8f135":"white"):"#555"}}>{n.l}</button>;
            })}
            <div style={{display:"flex",gap:3,marginLeft:3}}>
              <button onClick={creds?manualSync:function(){setShowCloudSetup(true);}} title={creds?"Sync now":"Set up cloud sync"} style={{...BS,padding:"6px 9px",fontSize:9,background:"none",border:"1px solid "+(creds?"#1e1e1e":"rgba(56,189,248,.2)"),color:creds?syncColor:"#38bdf8"}}>{creds?(syncStatus==="syncing"?"~":"o"):"+ Sync"}</button>
              <button onClick={exportBackup} title="Download backup" style={{...BS,padding:"6px 9px",fontSize:9,background:"none",border:"1px solid #1e1e1e",color:"#555"}}>save</button>
              <button onClick={importBackup} title="Import backup" style={{...BS,padding:"6px 9px",fontSize:9,background:"none",border:"1px solid #1e1e1e",color:"#555"}}>load</button>
              {installPrompt&&<button onClick={function(){installPrompt.prompt();}} style={{...BS,padding:"6px 9px",fontSize:9,background:"rgba(200,241,53,.08)",border:"1px solid rgba(200,241,53,.2)",color:"#c8f135"}}>install</button>}
            </div>
          </div>
        </div>
        {syncMsg&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:syncColor,letterSpacing:1,textAlign:"center",padding:"2px 0 4px",borderTop:"1px solid #0e0e0e"}}>{syncMsg}</div>}
      </div>

      <div style={{maxWidth:720,margin:"0 auto",padding:"15px 13px"}}>
        {page==="new"&&<NewTradeForm onSave={function(t){addTrade(t);setPage("journal");}} onCancel={function(){setPage("journal");}} firms={firms}/>}
        {page==="journal"&&<div className="fade">
          <StatsBar trades={trades}/>
          <div style={{display:"flex",gap:4,marginBottom:11,flexWrap:"wrap"}}>
            {["all","open","Win","Loss","Breakeven"].map(function(f){
              return <button key={f} onClick={function(){setFilter(f);}} style={{...BS,padding:"5px 9px",fontSize:9,background:filter===f?"#171717":"none",border:"1px solid "+(filter===f?"#252525":"#111"),color:filter===f?"white":"#444"}}>{f}</button>;
            })}
          </div>
          {filtered.length===0?<div style={{textAlign:"center",padding:"60px 0",fontFamily:"'DM Mono',monospace",fontSize:12,color:"#222"}}>{trades.length===0?"No trades yet — tap + Trade to start":"No trades match this filter"}</div>
          :filtered.map(function(t){return <TradeCard key={t.id} trade={t} onUpdate={updateTrade} onDelete={deleteTrade} firms={firms}/>;})}</div>}
        {page==="calendar"&&<div className="fade"><CalendarView trades={trades} title="All Accounts"/></div>}
        {page==="firms"&&<FirmsPage firms={firms} trades={trades} onUpdate={updateFirm} onDelete={deleteFirm} onAdd={addFirm} onReorder={function(arr){setFirms(arr);}} />}
        {page==="rules"&&<RulesPage rules={rules} onUpdate={function(r){setRules(r);}} />}
        {page==="news"&&<ForexNews/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
